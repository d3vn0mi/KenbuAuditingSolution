<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <!-- Eye shape - the "ken" (見) observation eye -->
  <path d="M8 16c0 0 3.5-5 8-5s8 5 8 5-3.5 5-8 5-8-5-8-5z"
        stroke="#00eeff" stroke-width="1.4" fill="none"/>

  <!-- Iris circle -->
  <circle cx="16" cy="16" r="2.8" stroke="#00eeff" stroke-width="1.2" fill="none"/>

  <!-- Pupil / scan dot -->
  <circle cx="16" cy="16" r="1.2" fill="#00eeff"/>

  <!-- Scan lines radiating from eye - representing auditing -->
  <line x1="16" y1="10" x2="16" y2="7" stroke="#00eeff" stroke-width="0.7" opacity="0.5"/>
  <line x1="20.5" y1="12" x2="22.5" y2="9.5" stroke="#00eeff" stroke-width="0.7" opacity="0.4"/>
  <line x1="11.5" y1="12" x2="9.5" y2="9.5" stroke="#00eeff" stroke-width="0.7" opacity="0.4"/>

  <!-- Bottom scan lines -->
  <line x1="16" y1="22" x2="16" y2="25" stroke="#00eeff" stroke-width="0.7" opacity="0.5"/>
  <line x1="20.5" y1="20" x2="22.5" y2="22.5" stroke="#00eeff" stroke-width="0.7" opacity="0.4"/>
  <line x1="11.5" y1="20" x2="9.5" y2="22.5" stroke="#00eeff" stroke-width="0.7" opacity="0.4"/>

  <!-- Corner brackets - digital/terminal feel -->
  <path d="M6 6h3M6 6v3" stroke="#00eeff" stroke-width="0.8" opacity="0.5" stroke-linecap="round"/>
  <path d="M26 6h-3M26 6v3" stroke="#00eeff" stroke-width="0.8" opacity="0.5" stroke-linecap="round"/>
  <path d="M6 26h3M6 26v-3" stroke="#00eeff" stroke-width="0.8" opacity="0.5" stroke-linecap="round"/>
  <path d="M26 26h-3M26 26v-3" stroke="#00eeff" stroke-width="0.8" opacity="0.5" stroke-linecap="round"/>
</svg>