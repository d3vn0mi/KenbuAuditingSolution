{% extends "base.html" %}
{% block title %}Change Password - Kenbu{% endblock %}
{% block content %}
<div class="max-w-md mx-auto">
    <div>
        <h1 class="text-2xl font-bold text-text-primary">Change Password</h1>
        <p class="mt-1 text-sm text-text-muted">Update your admin account password.</p>
    </div>

    <form method="POST" class="mt-6 space-y-6 bg-cyber-card border border-cyber-border rounded-lg p-6" hx-boost="false">
        <div>
            <label for="current_password" class="block text-sm font-medium text-text-primary">Current Password</label>
            <input type="password" name="current_password" id="current_password" required
                   class="mt-1 block w-full rounded-md border-cyber-border bg-cyber-card-hover text-text-primary shadow-sm focus:border-accent-cyan focus:ring-accent-cyan sm:text-sm px-3 py-2 border">
        </div>

        <div>
            <label for="new_password" class="block text-sm font-medium text-text-primary">New Password</label>
            <input type="password" name="new_password" id="new_password" required minlength="8"
                   class="mt-1 block w-full rounded-md border-cyber-border bg-cyber-card-hover text-text-primary shadow-sm focus:border-accent-cyan focus:ring-accent-cyan sm:text-sm px-3 py-2 border">
            <p class="mt-1 text-xs text-text-muted">Must be at least 8 characters.</p>
        </div>

        <div>
            <label for="confirm_password" class="block text-sm font-medium text-text-primary">Confirm New Password</label>
            <input type="password" name="confirm_password" id="confirm_password" required minlength="8"
                   class="mt-1 block w-full rounded-md border-cyber-border bg-cyber-card-hover text-text-primary shadow-sm focus:border-accent-cyan focus:ring-accent-cyan sm:text-sm px-3 py-2 border">
        </div>

        <div class="flex items-center justify-between pt-2">
            <a href="{{ url_for('admin.users') }}" class="text-sm text-text-muted hover:text-accent-cyan">Cancel</a>
            <button type="submit"
                    class="inline-flex items-center px-4 py-2 border border-transparent text-sm font-medium rounded-md text-white bg-accent-red hover:bg-accent-red-hover focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-accent-cyan focus:ring-offset-cyber-bg">
                Update Password
            </button>
        </div>
    </form>
</div>
{% endblock %}
