{% extends "base.html" %}
{% block title %}Log incident - Kenbu{% endblock %}
{% block content %}
<div class="mb-4"><a href="{{ url_for('incidents.list_incidents') }}" class="text-xs text-text-muted hover:text-accent-cyan">&larr; Incidents</a></div>
<div class="max-w-2xl">
    <h1 class="text-2xl font-bold text-text-primary mb-6">Log incident</h1>
    <form method="POST" class="space-y-4">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
        <div>
            <label for="title" class="block text-sm font-medium text-text-primary">Title</label>
            <input type="text" name="title" id="title" required class="mt-1 block w-full rounded-md border border-cyber-border bg-cyber-card-hover text-text-primary px-3 py-2 focus:border-accent-cyan focus:outline-none focus:ring-1 focus:ring-accent-cyan sm:text-sm">
        </div>
        <div class="grid grid-cols-2 gap-4">
            <div>
                <label for="severity" class="block text-sm font-medium text-text-primary">Severity</label>
                <select name="severity" id="severity" class="mt-1 block w-full rounded-md border border-cyber-border bg-cyber-card-hover text-text-primary px-3 py-2 focus:border-accent-cyan focus:outline-none focus:ring-1 focus:ring-accent-cyan sm:text-sm">
                    {% for s in severities %}<option value="{{ s }}">{{ s }}</option>{% endfor %}
                </select>
            </div>
            <div>
                <label for="detected_at" class="block text-sm font-medium text-text-primary">Detected at</label>
                <input type="datetime-local" name="detected_at" id="detected_at" required class="mt-1 block w-full rounded-md border border-cyber-border bg-cyber-card-hover text-text-secondary px-3 py-2 focus:border-accent-cyan focus:outline-none focus:ring-1 focus:ring-accent-cyan sm:text-sm">
                <p class="mt-1 text-xs text-text-muted">Starts the 24h / 72h / 1-month statutory clock.</p>
            </div>
        </div>
        <div>
            <label for="description" class="block text-sm font-medium text-text-primary">Description</label>
            <textarea name="description" id="description" rows="3" class="mt-1 block w-full rounded-md border border-cyber-border bg-cyber-card-hover text-text-primary px-3 py-2 focus:border-accent-cyan focus:outline-none focus:ring-1 focus:ring-accent-cyan sm:text-sm"></textarea>
        </div>
        <div>
            <label for="affected_systems" class="block text-sm font-medium text-text-primary">Affected systems</label>
            <textarea name="affected_systems" id="affected_systems" rows="2" class="mt-1 block w-full rounded-md border border-cyber-border bg-cyber-card-hover text-text-primary px-3 py-2 focus:border-accent-cyan focus:outline-none focus:ring-1 focus:ring-accent-cyan sm:text-sm"></textarea>
        </div>
        <div>
            <label for="regulation_id" class="block text-sm font-medium text-text-primary">Regulation</label>
            <select name="regulation_id" id="regulation_id" class="mt-1 block w-full rounded-md border border-cyber-border bg-cyber-card-hover text-text-primary px-3 py-2 focus:border-accent-cyan focus:outline-none focus:ring-1 focus:ring-accent-cyan sm:text-sm">
                <option value="">—</option>
                {% for reg in regulations %}<option value="{{ reg.id }}" {% if reg.slug == 'nis2' %}selected{% endif %}>{{ reg.name }}</option>{% endfor %}
            </select>
        </div>
        <button type="submit" class="rounded-md bg-accent-cyan/10 border border-accent-cyan/40 text-accent-cyan px-4 py-2 text-sm font-medium hover:bg-accent-cyan/20">Log incident</button>
    </form>
</div>
{% endblock %}
