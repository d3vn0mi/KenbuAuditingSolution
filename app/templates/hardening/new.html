{% extends "base.html" %}
{% block title %}New Hardening Task - Kenbu{% endblock %}
{% block content %}
<nav class="flex mb-4" aria-label="Breadcrumb">
    <ol class="flex items-center space-x-2 text-sm text-gray-500">
        <li><a href="{{ url_for('hardening.list_tasks') }}" class="hover:text-gray-700">Hardening</a></li>
        <li><span class="mx-1">/</span></li>
        <li class="text-gray-900 font-medium">New Task</li>
    </ol>
</nav>

<div class="max-w-2xl">
    <h1 class="text-2xl font-bold text-gray-900 mb-6">Create Hardening Task</h1>

    <div class="bg-white shadow rounded-lg p-6">
        <form method="POST" class="space-y-6" hx-boost="false">
            <div>
                <label for="title" class="block text-sm font-medium text-gray-700">Title</label>
                <input type="text" name="title" id="title" required autofocus placeholder="e.g., Q1 2026 Server Hardening"
                       class="mt-1 block w-full rounded-md border border-gray-300 px-3 py-2 shadow-sm focus:border-primary-500 focus:outline-none focus:ring-1 focus:ring-primary-500 sm:text-sm">
            </div>

            <div>
                <label for="description" class="block text-sm font-medium text-gray-700">Description</label>
                <textarea name="description" id="description" rows="3" placeholder="Describe the scope and goals of this hardening task..."
                          class="mt-1 block w-full rounded-md border border-gray-300 px-3 py-2 shadow-sm focus:border-primary-500 focus:outline-none focus:ring-1 focus:ring-primary-500 sm:text-sm"></textarea>
            </div>

            <div class="flex justify-end space-x-3">
                <a href="{{ url_for('hardening.list_tasks') }}" class="inline-flex items-center rounded-md bg-white px-3 py-2 text-sm font-semibold text-gray-900 shadow-sm ring-1 ring-inset ring-gray-300 hover:bg-gray-50">Cancel</a>
                <button type="submit" class="inline-flex items-center rounded-md bg-primary-600 px-3 py-2 text-sm font-semibold text-white shadow-sm hover:bg-primary-500">
                    Create Task
                </button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
