{% extends "base.html" %}
{% block title %}New Hardening Task - Kenbu{% endblock %}
{% block content %}
<nav class="flex mb-4" aria-label="Breadcrumb">
    <ol class="flex items-center space-x-2 text-sm text-text-muted">
        <li><a href="{{ url_for('hardening.list_tasks') }}" class="hover:text-accent-cyan">Hardening</a></li>
        <li><span class="mx-1">/</span></li>
        <li class="text-text-primary font-medium">New Task</li>
    </ol>
</nav>

<div class="max-w-2xl">
    <h1 class="text-2xl font-bold text-text-primary mb-6">Create Hardening Task</h1>

    <div class="bg-cyber-card border border-cyber-border rounded-lg p-6">
        <form method="POST" class="space-y-6" hx-boost="false">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
            <div>
                <label for="title" class="block text-sm font-medium text-text-primary">Title</label>
                <input type="text" name="title" id="title" required autofocus placeholder="e.g., Q1 2026 Server Hardening"
                       class="mt-1 block w-full rounded-md border border-cyber-border bg-cyber-card-hover text-text-primary px-3 py-2 shadow-sm focus:border-accent-cyan focus:outline-none focus:ring-1 focus:ring-accent-cyan sm:text-sm">
            </div>

            <div>
                <label for="description" class="block text-sm font-medium text-text-primary">Description</label>
                <textarea name="description" id="description" rows="3" placeholder="Describe the scope and goals of this hardening task..."
                          class="mt-1 block w-full rounded-md border border-cyber-border bg-cyber-card-hover text-text-primary px-3 py-2 shadow-sm focus:border-accent-cyan focus:outline-none focus:ring-1 focus:ring-accent-cyan sm:text-sm"></textarea>
            </div>

            <div class="flex justify-end space-x-3">
                <a href="{{ url_for('hardening.list_tasks') }}" class="inline-flex items-center rounded-md bg-cyber-card-hover px-3 py-2 text-sm font-semibold text-text-primary ring-1 ring-inset ring-cyber-border hover:bg-cyber-card">Cancel</a>
                <button type="submit" class="inline-flex items-center rounded-md bg-accent-red hover:bg-accent-red-hover px-3 py-2 text-sm font-semibold text-white shadow-sm">
                    Create Task
                </button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
