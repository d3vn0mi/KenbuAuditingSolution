{% extends "base.html" %}
{% block title %}Add Asset - Kenbu{% endblock %}
{% block content %}
<nav class="flex mb-4" aria-label="Breadcrumb">
    <ol class="flex items-center space-x-2 text-sm text-gray-500">
        <li><a href="{{ url_for('hardening.list_tasks') }}" class="hover:text-gray-700">Hardening</a></li>
        <li><span class="mx-1">/</span></li>
        <li><a href="{{ url_for('hardening.task_detail', task_id=task.id) }}" class="hover:text-gray-700">{{ task.title }}</a></li>
        <li><span class="mx-1">/</span></li>
        <li class="text-gray-900 font-medium">Add Asset</li>
    </ol>
</nav>

<div class="max-w-2xl">
    <h1 class="text-2xl font-bold text-gray-900 mb-6">Add Asset</h1>

    <div class="bg-white shadow rounded-lg p-6">
        <form method="POST" class="space-y-6" hx-boost="false">
            <div>
                <label for="name" class="block text-sm font-medium text-gray-700">Asset Name</label>
                <input type="text" name="name" id="name" required autofocus placeholder="e.g., PROD-WEB-01"
                       class="mt-1 block w-full rounded-md border border-gray-300 px-3 py-2 shadow-sm focus:border-primary-500 focus:outline-none focus:ring-1 focus:ring-primary-500 sm:text-sm">
                <p class="mt-1 text-xs text-gray-500">Hostname or descriptive name of the system to harden.</p>
            </div>

            <div>
                <label for="asset_type" class="block text-sm font-medium text-gray-700">Asset Type</label>
                <select name="asset_type" id="asset_type" required
                        class="mt-1 block w-full rounded-md border border-gray-300 px-3 py-2 shadow-sm focus:border-primary-500 focus:outline-none focus:ring-1 focus:ring-primary-500 sm:text-sm">
                    <option value="">Select a type...</option>
                    <option value="Server">Server</option>
                    <option value="Workstation">Workstation</option>
                    <option value="Network Device">Network Device</option>
                    <option value="Cloud Instance">Cloud Instance</option>
                    <option value="Container">Container</option>
                    <option value="Virtual Machine">Virtual Machine</option>
                    <option value="Other">Other</option>
                </select>
            </div>

            <div>
                <label for="notes" class="block text-sm font-medium text-gray-700">Notes</label>
                <textarea name="notes" id="notes" rows="3" placeholder="Any additional notes about this asset..."
                          class="mt-1 block w-full rounded-md border border-gray-300 px-3 py-2 shadow-sm focus:border-primary-500 focus:outline-none focus:ring-1 focus:ring-primary-500 sm:text-sm"></textarea>
            </div>

            <div class="flex justify-end space-x-3">
                <a href="{{ url_for('hardening.task_detail', task_id=task.id) }}" class="inline-flex items-center rounded-md bg-white px-3 py-2 text-sm font-semibold text-gray-900 shadow-sm ring-1 ring-inset ring-gray-300 hover:bg-gray-50">Cancel</a>
                <button type="submit" class="inline-flex items-center rounded-md bg-primary-600 px-3 py-2 text-sm font-semibold text-white shadow-sm hover:bg-primary-500">
                    Add Asset &amp; Assign Benchmarks
                </button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
