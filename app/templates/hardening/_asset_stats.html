<div id="asset-stats" {% if oob %}hx-swap-oob="true"{% endif %}
    <!-- Progress Stats -->
    <div class="grid grid-cols-2 sm:grid-cols-4 gap-4 mb-6">
        <div class="bg-white shadow rounded-lg p-4 text-center">
            <p class="text-2xl font-bold text-gray-900">{{ results|length }}</p>
            <p class="text-xs text-gray-500">Total</p>
        </div>
        <div class="bg-white shadow rounded-lg p-4 text-center">
            <p class="text-2xl font-bold text-green-600">{{ results|selectattr('status', 'equalto', 'done')|list|length }}</p>
            <p class="text-xs text-gray-500">Done</p>
        </div>
        <div class="bg-white shadow rounded-lg p-4 text-center">
            <p class="text-2xl font-bold text-gray-500">{{ results|selectattr('status', 'equalto', 'skipped')|list|length }}</p>
            <p class="text-xs text-gray-500">Skipped</p>
        </div>
        <div class="bg-white shadow rounded-lg p-4 text-center">
            <p class="text-2xl font-bold text-primary-600">{{ asset.progress }}%</p>
            <p class="text-xs text-gray-500">Progress</p>
        </div>
    </div>

    <!-- Progress Bar -->
    <div class="mb-6">
        <div class="w-full bg-gray-200 rounded-full h-3">
            <div class="bg-primary-600 h-3 rounded-full transition-all" style="width: {{ asset.progress }}%"></div>
        </div>
    </div>
</div>
