{% extends "base.html" %}
{% block title %}New finding - Kenbu{% endblock %}
{% block content %}
<div class="mb-4"><a href="{{ url_for('findings.list_findings') }}" class="text-xs text-text-muted hover:text-accent-cyan">&larr; Findings</a></div>
<div class="max-w-2xl">
    <h1 class="text-2xl font-bold text-text-primary mb-6">New finding</h1>
    <form method="POST" class="space-y-4">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
        <div>
            <label for="title" class="block text-sm font-medium text-text-primary">Title</label>
            <input type="text" name="title" id="title" required class="mt-1 block w-full rounded-md border border-cyber-border bg-cyber-card-hover text-text-primary px-3 py-2 focus:border-accent-cyan focus:outline-none focus:ring-1 focus:ring-accent-cyan sm:text-sm">
        </div>
        <div class="grid grid-cols-2 gap-4">
            <div>
                <label for="severity" class="block text-sm font-medium text-text-primary">Severity</label>
                <select name="severity" id="severity" class="mt-1 block w-full rounded-md border border-cyber-border bg-cyber-card-hover text-text-primary px-3 py-2 focus:border-accent-cyan focus:outline-none focus:ring-1 focus:ring-accent-cyan sm:text-sm">
                    {% for s in SEVERITY_LEVELS %}<option value="{{ s }}">{{ s }}</option>{% endfor %}
                </select>
            </div>
            <div>
                <label for="source" class="block text-sm font-medium text-text-primary">Source</label>
                <select name="source" id="source" class="mt-1 block w-full rounded-md border border-cyber-border bg-cyber-card-hover text-text-primary px-3 py-2 focus:border-accent-cyan focus:outline-none focus:ring-1 focus:ring-accent-cyan sm:text-sm">
                    {% for s in FINDING_SOURCES %}<option value="{{ s }}">{{ s }}</option>{% endfor %}
                </select>
            </div>
        </div>
        <div>
            <label for="description" class="block text-sm font-medium text-text-primary">Description</label>
            <textarea name="description" id="description" rows="3" class="mt-1 block w-full rounded-md border border-cyber-border bg-cyber-card-hover text-text-primary px-3 py-2 focus:border-accent-cyan focus:outline-none focus:ring-1 focus:ring-accent-cyan sm:text-sm"></textarea>
        </div>
        <div>
            <label for="remediation" class="block text-sm font-medium text-text-primary">Remediation</label>
            <textarea name="remediation" id="remediation" rows="2" class="mt-1 block w-full rounded-md border border-cyber-border bg-cyber-card-hover text-text-primary px-3 py-2 focus:border-accent-cyan focus:outline-none focus:ring-1 focus:ring-accent-cyan sm:text-sm"></textarea>
        </div>
        <div>
            <label for="control_ids" class="block text-sm font-medium text-text-primary">Linked controls</label>
            <select name="control_ids" id="control_ids" multiple size="6" class="mt-1 block w-full rounded-md border border-cyber-border bg-cyber-card-hover text-text-primary px-3 py-2 focus:border-accent-cyan focus:outline-none focus:ring-1 focus:ring-accent-cyan sm:text-sm">
                {% for c in controls %}<option value="{{ c.id }}">{{ c.code }} — {{ c.title }}</option>{% endfor %}
            </select>
        </div>
        <button type="submit" class="rounded-md bg-accent-cyan/10 border border-accent-cyan/40 text-accent-cyan px-4 py-2 text-sm font-medium hover:bg-accent-cyan/20">Create finding</button>
    </form>
</div>
{% endblock %}
