{% extends "base.html" %}
{% block title %}Register - Kenbu{% endblock %}
{% block content %}
<div class="flex min-h-[80vh] items-center justify-center">
    <div class="w-full max-w-md">
        <div class="text-center mb-8">
            <h2 class="text-3xl font-bold tracking-tight text-text-primary">Create Account</h2>
            <p class="mt-2 text-sm text-text-secondary">Register for Kenbu</p>
        </div>

        <div class="bg-cyber-card border border-cyber-border rounded-lg card-glow transition-all p-8">
            <form method="POST" class="space-y-6" hx-boost="false">
                <div>
                    <label for="username" class="block text-sm font-medium text-text-primary">Username</label>
                    <input type="text" name="username" id="username" required autofocus
                           class="mt-1 block w-full rounded-md border border-cyber-border bg-cyber-card-hover text-text-primary px-3 py-2 shadow-sm focus:border-accent-cyan focus:outline-none focus:ring-1 focus:ring-accent-cyan">
                </div>

                <div>
                    <label for="display_name" class="block text-sm font-medium text-text-primary">Display Name</label>
                    <input type="text" name="display_name" id="display_name"
                           class="mt-1 block w-full rounded-md border border-cyber-border bg-cyber-card-hover text-text-primary px-3 py-2 shadow-sm focus:border-accent-cyan focus:outline-none focus:ring-1 focus:ring-accent-cyan">
                </div>

                <div>
                    <label for="password" class="block text-sm font-medium text-text-primary">Password</label>
                    <input type="password" name="password" id="password" required minlength="8"
                           class="mt-1 block w-full rounded-md border border-cyber-border bg-cyber-card-hover text-text-primary px-3 py-2 shadow-sm focus:border-accent-cyan focus:outline-none focus:ring-1 focus:ring-accent-cyan">
                    <p class="mt-1 text-xs text-text-muted">Minimum 8 characters</p>
                </div>

                <div>
                    <label for="confirm_password" class="block text-sm font-medium text-text-primary">Confirm Password</label>
                    <input type="password" name="confirm_password" id="confirm_password" required
                           class="mt-1 block w-full rounded-md border border-cyber-border bg-cyber-card-hover text-text-primary px-3 py-2 shadow-sm focus:border-accent-cyan focus:outline-none focus:ring-1 focus:ring-accent-cyan">
                </div>

                <button type="submit" class="w-full flex justify-center py-2 px-4 border border-transparent rounded-md shadow-sm text-sm font-medium text-white bg-accent-red hover:bg-accent-red-hover focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-accent-cyan focus:ring-offset-cyber-bg">
                    Create Account
                </button>
            </form>

            {% if config.GITHUB_CLIENT_ID %}
            <div class="mt-6">
                <div class="relative">
                    <div class="absolute inset-0 flex items-center">
                        <div class="w-full border-t border-cyber-border"></div>
                    </div>
                    <div class="relative flex justify-center text-sm">
                        <span class="bg-cyber-card px-2 text-text-muted">Or sign up with</span>
                    </div>
                </div>

                <div class="mt-6">
                    <a href="{{ url_for('oauth.github_login') }}"
                       class="w-full inline-flex justify-center items-center gap-3 py-2.5 px-4 border border-cyber-border rounded-md bg-cyber-card text-sm font-medium text-text-primary hover:bg-cyber-card-hover focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-accent-cyan focus:ring-offset-cyber-bg transition-colors">
                        <svg class="h-5 w-5" viewBox="0 0 24 24" fill="currentColor">
                            <path d="M12 0c-6.626 0-12 5.373-12 12 0 5.302 3.438 9.8 8.207 11.387.599.111.793-.261.793-.577v-2.234c-3.338.726-4.033-1.416-4.033-1.416-.546-1.387-1.333-1.756-1.333-1.756-1.089-.745.083-.729.083-.729 1.205.084 1.839 1.237 1.839 1.237 1.07 1.834 2.807 1.304 3.492.997.107-.775.418-1.305.762-1.604-2.665-.305-5.467-1.334-5.467-5.931 0-1.311.469-2.381 1.236-3.221-.124-.303-.535-1.524.117-3.176 0 0 1.008-.322 3.301 1.23.957-.266 1.983-.399 3.003-.404 1.02.005 2.047.138 3.006.404 2.291-1.552 3.297-1.23 3.297-1.23.653 1.653.242 2.874.118 3.176.77.84 1.235 1.911 1.235 3.221 0 4.609-2.807 5.624-5.479 5.921.43.372.823 1.102.823 2.222v3.293c0 .319.192.694.801.576 4.765-1.589 8.199-6.086 8.199-11.386 0-6.627-5.373-12-12-12z"/>
                        </svg>
                        Sign up with GitHub
                    </a>
                </div>
            </div>
            {% endif %}

            <p class="mt-6 text-center text-sm text-text-secondary">
                Already have an account?
                <a href="{{ url_for('auth.login') }}" class="font-medium text-accent-cyan hover:text-accent-cyan-dim">Sign in</a>
            </p>
        </div>
    </div>
</div>
{% endblock %}
