{% extends "base.html" %}
{% block title %}Verify MFA - Kenbu{% endblock %}
{% block content %}
<div class="flex min-h-[80vh] items-center justify-center">
    <div class="w-full max-w-md">
        <div class="text-center mb-8">
            <svg class="mx-auto h-12 w-12 text-primary-600" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" d="M16.5 10.5V6.75a4.5 4.5 0 1 0-9 0v3.75m-.75 11.25h10.5a2.25 2.25 0 0 0 2.25-2.25v-6.75a2.25 2.25 0 0 0-2.25-2.25H6.75a2.25 2.25 0 0 0-2.25 2.25v6.75a2.25 2.25 0 0 0 2.25 2.25Z" />
            </svg>
            <h2 class="mt-4 text-2xl font-bold tracking-tight text-gray-900">Two-Factor Authentication</h2>
            <p class="mt-2 text-sm text-gray-600">Enter the verification code from your authenticator app</p>
        </div>

        <div class="bg-white shadow-lg rounded-lg p-8">
            <form method="POST" class="space-y-6" hx-boost="false">
                <div>
                    <label for="token" class="block text-sm font-medium text-gray-700">Verification Code</label>
                    <input type="text" name="token" id="token" required autofocus
                           inputmode="numeric" pattern="[0-9]{6}" maxlength="6"
                           placeholder="000000"
                           autocomplete="one-time-code"
                           class="mt-1 block w-full rounded-md border border-gray-300 px-3 py-2 shadow-sm focus:border-primary-500 focus:outline-none focus:ring-1 focus:ring-primary-500 text-center text-2xl tracking-[0.5em] font-mono">
                </div>

                <button type="submit" class="w-full flex justify-center py-2 px-4 border border-transparent rounded-md shadow-sm text-sm font-medium text-white bg-primary-600 hover:bg-primary-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-primary-500">
                    Verify
                </button>
            </form>

            <p class="mt-6 text-center text-sm text-gray-500">
                <a href="{{ url_for('auth.login') }}" class="font-medium text-primary-600 hover:text-primary-500">Back to login</a>
            </p>
        </div>
    </div>
</div>
{% endblock %}
