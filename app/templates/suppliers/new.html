{% extends "base.html" %}
{% block title %}Add supplier - Kenbu{% endblock %}
{% block content %}
<div class="mb-4"><a href="{{ url_for('suppliers.list_suppliers') }}" class="text-xs text-text-muted hover:text-accent-cyan">&larr; Suppliers</a></div>
<div class="max-w-2xl">
    <h1 class="text-2xl font-bold text-text-primary mb-6">Add supplier</h1>
    <form method="POST" class="space-y-4">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
        <div>
            <label for="name" class="block text-sm font-medium text-text-primary">Name</label>
            <input type="text" name="name" id="name" required class="mt-1 block w-full rounded-md border border-cyber-border bg-cyber-card-hover text-text-primary px-3 py-2 focus:border-accent-cyan focus:outline-none focus:ring-1 focus:ring-accent-cyan sm:text-sm">
        </div>
        <div class="grid grid-cols-3 gap-4">
            <div>
                <label for="criticality" class="block text-sm font-medium text-text-primary">Criticality</label>
                <select name="criticality" id="criticality" class="mt-1 block w-full rounded-md border border-cyber-border bg-cyber-card-hover text-text-primary px-3 py-2 focus:border-accent-cyan focus:outline-none focus:ring-1 focus:ring-accent-cyan sm:text-sm">
                    {% for c in criticality %}<option value="{{ c }}" {% if c == 'medium' %}selected{% endif %}>{{ c }}</option>{% endfor %}
                </select>
            </div>
            <div>
                <label for="country" class="block text-sm font-medium text-text-primary">Country</label>
                <input type="text" name="country" id="country" class="mt-1 block w-full rounded-md border border-cyber-border bg-cyber-card-hover text-text-primary px-3 py-2 focus:border-accent-cyan focus:outline-none focus:ring-1 focus:ring-accent-cyan sm:text-sm">
            </div>
            <div>
                <label for="contact" class="block text-sm font-medium text-text-primary">Contact</label>
                <input type="text" name="contact" id="contact" class="mt-1 block w-full rounded-md border border-cyber-border bg-cyber-card-hover text-text-primary px-3 py-2 focus:border-accent-cyan focus:outline-none focus:ring-1 focus:ring-accent-cyan sm:text-sm">
            </div>
        </div>
        <div>
            <label for="description" class="block text-sm font-medium text-text-primary">Description</label>
            <textarea name="description" id="description" rows="2" class="mt-1 block w-full rounded-md border border-cyber-border bg-cyber-card-hover text-text-primary px-3 py-2 focus:border-accent-cyan focus:outline-none focus:ring-1 focus:ring-accent-cyan sm:text-sm"></textarea>
        </div>
        {% if controls %}
        <div>
            <label for="control_ids" class="block text-sm font-medium text-text-primary">Supply-chain controls</label>
            <select name="control_ids" id="control_ids" multiple size="4" class="mt-1 block w-full rounded-md border border-cyber-border bg-cyber-card-hover text-text-primary px-3 py-2 focus:border-accent-cyan focus:outline-none focus:ring-1 focus:ring-accent-cyan sm:text-sm">
                {% for c in controls %}<option value="{{ c.id }}">{{ c.code }} — {{ c.title }}</option>{% endfor %}
            </select>
        </div>
        {% endif %}
        <button type="submit" class="rounded-md bg-accent-cyan/10 border border-accent-cyan/40 text-accent-cyan px-4 py-2 text-sm font-medium hover:bg-accent-cyan/20">Add supplier</button>
    </form>
</div>
{% endblock %}
