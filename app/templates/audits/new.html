{% extends "base.html" %}
{% block title %}New Audit Session - Kenbu{% endblock %}
{% block content %}
<nav class="flex mb-4" aria-label="Breadcrumb">
    <ol class="flex items-center space-x-2 text-sm text-text-muted">
        <li><a href="{{ url_for('audits.list_audits') }}" class="hover:text-accent-cyan">Audits</a></li>
        <li><span class="mx-1">/</span></li>
        <li class="text-text-primary font-medium">New Session</li>
    </ol>
</nav>

<div class="max-w-2xl">
    <h1 class="text-2xl font-bold text-text-primary mb-6">Create Audit Session</h1>

    <div class="bg-cyber-card border border-cyber-border rounded-lg p-6">
        <form method="POST" class="space-y-6" hx-boost="false">
            <div>
                <label for="title" class="block text-sm font-medium text-text-primary">Session Title</label>
                <input type="text" name="title" id="title" required autofocus placeholder="e.g., Q1 2026 Production Audit"
                       class="mt-1 block w-full rounded-md border border-cyber-border bg-cyber-card-hover text-text-primary px-3 py-2 shadow-sm focus:border-accent-cyan focus:outline-none focus:ring-1 focus:ring-accent-cyan sm:text-sm">
                <p class="mt-1 text-xs text-text-muted">A descriptive name for this audit session.</p>
            </div>

            <div>
                <label for="description" class="block text-sm font-medium text-text-primary">Description</label>
                <textarea name="description" id="description" rows="3" placeholder="Scope, objectives, or context for this audit..."
                          class="mt-1 block w-full rounded-md border border-cyber-border bg-cyber-card-hover text-text-primary px-3 py-2 shadow-sm focus:border-accent-cyan focus:outline-none focus:ring-1 focus:ring-accent-cyan sm:text-sm"></textarea>
            </div>

            <div>
                <label for="standard_id" class="block text-sm font-medium text-text-primary">Compliance Standard (optional)</label>
                <select name="standard_id" id="standard_id"
                        class="mt-1 block w-full rounded-md border border-cyber-border bg-cyber-card-hover text-text-primary px-3 py-2 shadow-sm focus:border-accent-cyan focus:outline-none focus:ring-1 focus:ring-accent-cyan sm:text-sm">
                    <option value="">No standard filter — all CIS checks</option>
                    {% for standard in standards %}
                    <option value="{{ standard.id }}">{{ standard.name }}{% if standard.version %} ({{ standard.version }}){% endif %}</option>
                    {% endfor %}
                </select>
                <p class="mt-1 text-xs text-text-muted">If selected, only checks mapped to this standard will be included.</p>
            </div>

            <div>
                <label for="notes" class="block text-sm font-medium text-text-primary">Notes</label>
                <textarea name="notes" id="notes" rows="3" placeholder="Any additional notes about this audit..."
                          class="mt-1 block w-full rounded-md border border-cyber-border bg-cyber-card-hover text-text-primary px-3 py-2 shadow-sm focus:border-accent-cyan focus:outline-none focus:ring-1 focus:ring-accent-cyan sm:text-sm"></textarea>
            </div>

            <div class="flex justify-end space-x-3">
                <a href="{{ url_for('audits.list_audits') }}" class="inline-flex items-center rounded-md bg-cyber-card-hover px-3 py-2 text-sm font-semibold text-text-primary shadow-sm ring-1 ring-inset ring-cyber-border hover:bg-cyber-card">Cancel</a>
                <button type="submit" class="inline-flex items-center rounded-md bg-accent-red hover:bg-accent-red-hover px-3 py-2 text-sm font-semibold text-white shadow-sm">
                    Create Session
                </button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
