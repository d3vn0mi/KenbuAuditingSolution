{% extends "base.html" %}
{% block title %}New assessment - Kenbu{% endblock %}
{% block content %}
<div class="mb-4">
    <a href="{{ url_for('readiness.list_assessments') }}" class="text-xs text-text-muted hover:text-accent-cyan">&larr; Readiness</a>
</div>
<div class="max-w-xl">
    <h1 class="text-2xl font-bold text-text-primary mb-6">New readiness assessment</h1>
    <form method="POST" class="space-y-4">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
        <div>
            <label for="title" class="block text-sm font-medium text-text-primary">Title</label>
            <input type="text" name="title" id="title" required
                   class="mt-1 block w-full rounded-md border border-cyber-border bg-cyber-card-hover text-text-primary px-3 py-2 focus:border-accent-cyan focus:outline-none focus:ring-1 focus:ring-accent-cyan sm:text-sm">
        </div>
        <div>
            <label for="regulation_id" class="block text-sm font-medium text-text-primary">Regulation</label>
            <select name="regulation_id" id="regulation_id"
                    class="mt-1 block w-full rounded-md border border-cyber-border bg-cyber-card-hover text-text-primary px-3 py-2 focus:border-accent-cyan focus:outline-none focus:ring-1 focus:ring-accent-cyan sm:text-sm">
                <option value="">Cross-regulation (all controls)</option>
                {% for reg in regulations %}
                <option value="{{ reg.id }}">{{ reg.name }}{% if reg.version %} ({{ reg.version }}){% endif %}</option>
                {% endfor %}
            </select>
            <p class="mt-1 text-xs text-text-muted">Controls mapped to the chosen regulation are added automatically.</p>
        </div>
        <button type="submit" class="rounded-md bg-accent-cyan/10 border border-accent-cyan/40 text-accent-cyan px-4 py-2 text-sm font-medium hover:bg-accent-cyan/20">Create assessment</button>
    </form>
</div>
{% endblock %}
