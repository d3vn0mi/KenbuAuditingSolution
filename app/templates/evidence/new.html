{% extends "base.html" %}
{% block title %}Add evidence - Kenbu{% endblock %}
{% block content %}
<div class="mb-4">
    <a href="{{ url_for('evidence.list_evidence') }}" class="text-xs text-text-muted hover:text-accent-cyan">&larr; Evidence</a>
</div>
<div class="max-w-2xl">
    <h1 class="text-2xl font-bold text-text-primary mb-6">Add evidence</h1>
    <form method="POST" enctype="multipart/form-data" class="space-y-4">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
        <div>
            <label for="title" class="block text-sm font-medium text-text-primary">Title</label>
            <input type="text" name="title" id="title" required
                   class="mt-1 block w-full rounded-md border border-cyber-border bg-cyber-card-hover text-text-primary px-3 py-2 focus:border-accent-cyan focus:outline-none focus:ring-1 focus:ring-accent-cyan sm:text-sm">
        </div>
        <div>
            <label for="description" class="block text-sm font-medium text-text-primary">Description</label>
            <textarea name="description" id="description" rows="2"
                      class="mt-1 block w-full rounded-md border border-cyber-border bg-cyber-card-hover text-text-primary px-3 py-2 focus:border-accent-cyan focus:outline-none focus:ring-1 focus:ring-accent-cyan sm:text-sm"></textarea>
        </div>
        <div class="grid grid-cols-1 sm:grid-cols-3 gap-4">
            <div>
                <label for="evidence_type" class="block text-sm font-medium text-text-primary">Type</label>
                <select name="evidence_type" id="evidence_type"
                        class="mt-1 block w-full rounded-md border border-cyber-border bg-cyber-card-hover text-text-primary px-3 py-2 focus:border-accent-cyan focus:outline-none focus:ring-1 focus:ring-accent-cyan sm:text-sm">
                    {% for t in evidence_types %}<option value="{{ t }}">{{ t }}</option>{% endfor %}
                </select>
            </div>
            <div>
                <label for="valid_until" class="block text-sm font-medium text-text-primary">Valid until</label>
                <input type="date" name="valid_until" id="valid_until"
                       class="mt-1 block w-full rounded-md border border-cyber-border bg-cyber-card-hover text-text-secondary px-3 py-2 focus:border-accent-cyan focus:outline-none focus:ring-1 focus:ring-accent-cyan sm:text-sm">
            </div>
            <div>
                <label for="review_date" class="block text-sm font-medium text-text-primary">Review date</label>
                <input type="date" name="review_date" id="review_date"
                       class="mt-1 block w-full rounded-md border border-cyber-border bg-cyber-card-hover text-text-secondary px-3 py-2 focus:border-accent-cyan focus:outline-none focus:ring-1 focus:ring-accent-cyan sm:text-sm">
            </div>
        </div>
        <div>
            <label for="control_ids" class="block text-sm font-medium text-text-primary">Linked controls</label>
            <select name="control_ids" id="control_ids" multiple size="6"
                    class="mt-1 block w-full rounded-md border border-cyber-border bg-cyber-card-hover text-text-primary px-3 py-2 focus:border-accent-cyan focus:outline-none focus:ring-1 focus:ring-accent-cyan sm:text-sm">
                {% for c in controls %}<option value="{{ c.id }}">{{ c.code }} — {{ c.title }}</option>{% endfor %}
            </select>
        </div>
        <div>
            <label for="file" class="block text-sm font-medium text-text-primary">File (encrypted at rest)</label>
            <input type="file" name="file" id="file"
                   class="mt-1 block w-full text-sm text-text-secondary file:mr-3 file:rounded-md file:border-0 file:bg-accent-cyan/10 file:text-accent-cyan file:px-3 file:py-1.5">
        </div>
        <button type="submit" class="rounded-md bg-accent-cyan/10 border border-accent-cyan/40 text-accent-cyan px-4 py-2 text-sm font-medium hover:bg-accent-cyan/20">Add evidence</button>
    </form>
</div>
{% endblock %}
