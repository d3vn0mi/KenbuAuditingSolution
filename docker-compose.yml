services:
  db:
    image: postgres:16-alpine
    container_name: kenbu-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-kenbu}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      POSTGRES_DB: ${POSTGRES_DB:-kenbu}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - kenbu_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-kenbu} -d ${POSTGRES_DB:-kenbu}"]
      interval: 5s
      timeout: 3s
      retries: 5

  kenbu:
    build: .
    container_name: kenbu
    restart: unless-stopped
    env_file: .env
    depends_on:
      db:
        condition: service_healthy
    networks:
      - kenbu_net

  caddy:
    image: caddy:2-alpine
    container_name: kenbu-caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    networks:
      - kenbu_net
    depends_on:
      - kenbu

volumes:
  postgres_data:
  caddy_data:
  caddy_config:

networks:
  kenbu_net:
