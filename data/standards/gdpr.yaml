standard_slug: gdpr

mappings:
  # ==========================================================================
  # GDPR Article 5(1)(f) — Integrity and Confidentiality Principle
  # "processed in a manner that ensures appropriate security of the personal
  # data, including protection against unauthorised or unlawful processing"
  # ==========================================================================

  # --- Filesystem hardening (Linux) ---
  - check_number: "1.1.1"
    article: "Art. 5(1)(f)"
    requirement: "Integrity & confidentiality — disable unnecessary filesystem types"
  - check_number: "1.1.2"
    article: "Art. 5(1)(f)"
    requirement: "Integrity & confidentiality — disable unnecessary filesystem types"
  - check_number: "1.1.3"
    article: "Art. 5(1)(f)"
    requirement: "Integrity & confidentiality — disable unnecessary filesystem types"

  # Debian 4-level filesystem checks
  - check_number: "1.1.1.1"
    article: "Art. 5(1)(f)"
    requirement: "Integrity & confidentiality — disable cramfs kernel module"
  - check_number: "1.1.1.2"
    article: "Art. 5(1)(f)"
    requirement: "Integrity & confidentiality — disable squashfs kernel module"
  - check_number: "1.1.1.3"
    article: "Art. 5(1)(f)"
    requirement: "Integrity & confidentiality — disable udf kernel module"

  # --- File permission controls (Linux) ---
  - check_number: "6.1.1"
    article: "Art. 5(1)(f)"
    requirement: "Integrity & confidentiality — restrict /etc/passwd permissions"
  - check_number: "6.1.2"
    article: "Art. 5(1)(f)"
    requirement: "Integrity & confidentiality — restrict /etc/shadow permissions"
  - check_number: "6.1.3"
    article: "Art. 5(1)(f)"
    requirement: "Integrity & confidentiality — restrict /etc/group permissions"
  - check_number: "6.1.4"
    article: "Art. 5(1)(f)"
    requirement: "Integrity & confidentiality — restrict /etc/gshadow permissions"
  - check_number: "6.1.5"
    article: "Art. 5(1)(f)"
    requirement: "Integrity & confidentiality — restrict /etc/group permissions"
  - check_number: "6.1.6"
    article: "Art. 5(1)(f)"
    requirement: "Integrity & confidentiality — restrict /etc/gshadow permissions"
  - check_number: "6.2.1"
    article: "Art. 5(1)(f)"
    requirement: "Integrity & confidentiality — no world-writable files"
  - check_number: "6.2.2"
    article: "Art. 5(1)(f)"
    requirement: "Integrity & confidentiality — no unowned files"
  - check_number: "6.2.3"
    article: "Art. 5(1)(f)"
    requirement: "Integrity & confidentiality — audit privileged executables"
  - check_number: "6.2.4"
    article: "Art. 5(1)(f)"
    requirement: "Integrity & confidentiality — audit privileged executables"
  - check_number: "6.2.5"
    article: "Art. 5(1)(f)"
    requirement: "Integrity & confidentiality — audit SGID executables"

  # ==========================================================================
  # GDPR Article 25 — Data Protection by Design and by Default
  # "implement appropriate technical and organisational measures ... designed
  # to implement data-protection principles ... in an effective manner"
  # ==========================================================================

  # --- Service minimization (Linux) ---
  - check_number: "2.1.1"
    article: "Art. 25"
    requirement: "Data protection by design — disable unnecessary services"
  - check_number: "2.1.2"
    article: "Art. 25"
    requirement: "Data protection by design — disable Avahi/mDNS"
  - check_number: "2.1.3"
    article: "Art. 25"
    requirement: "Data protection by design — disable CUPS printing"
  - check_number: "2.1.4"
    article: "Art. 25"
    requirement: "Data protection by design — disable DHCP server"
  - check_number: "2.1.5"
    article: "Art. 25"
    requirement: "Data protection by design — disable LDAP server"
  - check_number: "2.1.6"
    article: "Art. 25"
    requirement: "Data protection by design — disable NFS/Samba"
  - check_number: "2.1.7"
    article: "Art. 25"
    requirement: "Data protection by design — disable SNMP/DNS server"
  - check_number: "2.1.8"
    article: "Art. 25"
    requirement: "Data protection by design — disable FTP server"
  - check_number: "2.1.9"
    article: "Art. 25"
    requirement: "Data protection by design — disable HTTP server"
  - check_number: "2.1.10"
    article: "Art. 25"
    requirement: "Data protection by design — disable IMAP/POP3 server"
  - check_number: "2.1.11"
    article: "Art. 25"
    requirement: "Data protection by design — disable Samba"
  - check_number: "2.1.12"
    article: "Art. 25"
    requirement: "Data protection by design — disable rsync"
  - check_number: "2.1.13"
    article: "Art. 25"
    requirement: "Data protection by design — disable SNMP server"

  # macOS service minimization
  - check_number: "2.3.1"
    article: "Art. 25"
    requirement: "Data protection by design — disable screen sharing"
  - check_number: "2.3.2"
    article: "Art. 25"
    requirement: "Data protection by design — disable file sharing"
  - check_number: "2.3.3"
    article: "Art. 25"
    requirement: "Data protection by design — disable remote login"
  - check_number: "2.3.4"
    article: "Art. 25"
    requirement: "Data protection by design — disable remote management"
  - check_number: "2.3.5"
    article: "Art. 25"
    requirement: "Data protection by design — disable printer sharing"
  - check_number: "2.3.6"
    article: "Art. 25"
    requirement: "Data protection by design — disable AirDrop when not in use"

  # Windows guest/anonymous access
  - check_number: "2.3.1"
    article: "Art. 25"
    requirement: "Data protection by default — disable guest account"
  - check_number: "2.3.6"
    article: "Art. 25"
    requirement: "Data protection by default — block anonymous SAM enumeration"

  # Cisco unnecessary services
  - check_number: "2.1.1"
    article: "Art. 25"
    requirement: "Data protection by design — disable ip source-route"
  - check_number: "2.1.2"
    article: "Art. 25"
    requirement: "Data protection by design — disable ip finger"
  - check_number: "2.1.5"
    article: "Art. 25"
    requirement: "Data protection by design — disable CDP on external interfaces"
  - check_number: "2.1.6"
    article: "Art. 25"
    requirement: "Data protection by design — disable ip bootp server"

  # Windows unnecessary services
  - check_number: "5.1.1"
    article: "Art. 25"
    requirement: "Data protection by design — disable Bluetooth service"
  - check_number: "5.1.2"
    article: "Art. 25"
    requirement: "Data protection by design — disable Remote Registry"
  - check_number: "5.1.3"
    article: "Art. 25"
    requirement: "Data protection by design — disable Xbox services"
  - check_number: "5.1.4"
    article: "Art. 25"
    requirement: "Data protection by design — disable Xbox Game Save"

  # ==========================================================================
  # GDPR Article 32(1)(a) — Encryption and Pseudonymisation
  # "the pseudonymisation and encryption of personal data"
  # ==========================================================================

  # --- Crypto policy (Linux) ---
  - check_number: "1.4.1"
    article: "Art. 32(1)(a)"
    requirement: "Encryption — enforce system-wide crypto policy"
  - check_number: "1.5.1"
    article: "Art. 32(1)(a)"
    requirement: "Encryption — enforce strong crypto policy"
  - check_number: "1.5.2"
    article: "Art. 32(1)(a)"
    requirement: "Encryption — disable SHA-1 hash support"

  # SSH encryption
  - check_number: "5.2.5"
    article: "Art. 32(1)(a)"
    requirement: "Encryption — enforce SSH idle timeout"
  - check_number: "5.2.6"
    article: "Art. 32(1)(a)"
    requirement: "Encryption — enforce SSH Protocol 2 and strong ciphers"

  # macOS FileVault
  - check_number: "2.4.2"
    article: "Art. 32(1)(a)"
    requirement: "Encryption — enable FileVault full-disk encryption"

  # Cisco SSH/SNMP encryption
  - check_number: "1.5.3"
    article: "Art. 32(1)(a)"
    requirement: "Encryption — enable SNMPv3 with authPriv"
  - check_number: "1.6.1"
    article: "Art. 32(1)(a)"
    requirement: "Encryption — enforce SSH version 2"

  # Windows encryption
  - check_number: "18.3.3"
    article: "Art. 32(1)(a)"
    requirement: "Encryption — RDP connection encryption set to High Level"
  - check_number: "18.4.1"
    article: "Art. 32(1)(a)"
    requirement: "Encryption — disable WinRM basic authentication"
  - check_number: "18.4.2"
    article: "Art. 32(1)(a)"
    requirement: "Encryption — disable WinRM unencrypted traffic"
  - check_number: "2.3.7"
    article: "Art. 32(1)(a)"
    requirement: "Encryption — enforce NTLMv2, refuse LM & NTLM"

  # ==========================================================================
  # GDPR Article 32(1)(b) — Ongoing Confidentiality, Integrity, Availability
  # "the ability to ensure the ongoing confidentiality, integrity, availability
  # and resilience of processing systems and services"
  # ==========================================================================

  # --- Access control: SSH (Linux) ---
  - check_number: "5.2.1"
    article: "Art. 32(1)(b)"
    requirement: "Confidentiality — restrict sshd_config permissions"
  - check_number: "5.2.2"
    article: "Art. 32(1)(b)"
    requirement: "Confidentiality — disable SSH root login"
  - check_number: "5.2.3"
    article: "Art. 32(1)(b)"
    requirement: "Confidentiality — limit SSH authentication attempts"
  - check_number: "5.2.4"
    article: "Art. 32(1)(b)"
    requirement: "Confidentiality — disable SSH empty passwords"

  # --- Access control: sudo ---
  - check_number: "5.4.1"
    article: "Art. 32(1)(b)"
    requirement: "Confidentiality — ensure sudo is installed and configured"
  - check_number: "5.4.2"
    article: "Art. 32(1)(b)"
    requirement: "Confidentiality — sudo commands use pty"
  - check_number: "5.4.3"
    article: "Art. 32(1)(b)"
    requirement: "Confidentiality — sudo log file exists"
  - check_number: "5.5.1"
    article: "Art. 32(1)(b)"
    requirement: "Confidentiality — enforce password restrictions"

  # --- Password policies (Linux) ---
  - check_number: "5.3.1"
    article: "Art. 32(1)(b)"
    requirement: "Confidentiality — password creation requirements"
  - check_number: "5.3.2"
    article: "Art. 32(1)(b)"
    requirement: "Confidentiality — lockout for failed password attempts"
  - check_number: "5.3.3"
    article: "Art. 32(1)(b)"
    requirement: "Confidentiality — strong password hashing algorithm"
  - check_number: "5.5.2"
    article: "Art. 32(1)(b)"
    requirement: "Confidentiality — minimum days between password changes"
  - check_number: "5.5.3"
    article: "Art. 32(1)(b)"
    requirement: "Confidentiality — restrictive default umask"

  # --- Network security (all platforms) ---
  - check_number: "3.1.1"
    article: "Art. 32(1)(b)"
    requirement: "Availability & integrity — disable IP forwarding"
  - check_number: "3.1.2"
    article: "Art. 32(1)(b)"
    requirement: "Integrity — reject ICMP redirects"
  - check_number: "3.1.3"
    article: "Art. 32(1)(b)"
    requirement: "Integrity — reject source-routed packets"
  - check_number: "3.1.4"
    article: "Art. 32(1)(b)"
    requirement: "Availability — enable TCP SYN Cookies"
  - check_number: "3.2.1"
    article: "Art. 32(1)(b)"
    requirement: "Availability — firewall installed and enabled"
  - check_number: "3.2.2"
    article: "Art. 32(1)(b)"
    requirement: "Availability — firewall default zone configured"
  - check_number: "3.2.3"
    article: "Art. 32(1)(b)"
    requirement: "Availability — firewall policy configured"
  - check_number: "3.3.1"
    article: "Art. 32(1)(b)"
    requirement: "Availability — network segmentation (IPv6/UFW)"
  - check_number: "3.3.2"
    article: "Art. 32(1)(b)"
    requirement: "Availability — firewall service enabled"
  - check_number: "3.3.3"
    article: "Art. 32(1)(b)"
    requirement: "Availability — default deny firewall policy"

  # Debian network checks
  - check_number: "3.2.1"
    article: "Art. 32(1)(b)"
    requirement: "Integrity — reject source-routed packets"
  - check_number: "3.2.2"
    article: "Art. 32(1)(b)"
    requirement: "Integrity — reject ICMP redirects"
  - check_number: "3.2.3"
    article: "Art. 32(1)(b)"
    requirement: "Availability — enable TCP SYN Cookies"
  - check_number: "3.3.1"
    article: "Art. 32(1)(b)"
    requirement: "Integrity — reject IPv6 router advertisements"
  - check_number: "3.3.2"
    article: "Art. 32(1)(b)"
    requirement: "Integrity — reject IPv6 redirects"

  # Windows firewall
  - check_number: "3.1.1"
    article: "Art. 32(1)(b)"
    requirement: "Availability — Windows Firewall domain profile on"
  - check_number: "3.1.2"
    article: "Art. 32(1)(b)"
    requirement: "Availability — block inbound domain connections"
  - check_number: "3.1.3"
    article: "Art. 32(1)(b)"
    requirement: "Availability — log dropped packets"
  - check_number: "3.2.1"
    article: "Art. 32(1)(b)"
    requirement: "Availability — Windows Firewall private profile on"
  - check_number: "3.2.2"
    article: "Art. 32(1)(b)"
    requirement: "Availability — block inbound private connections"
  - check_number: "3.3.1"
    article: "Art. 32(1)(b)"
    requirement: "Availability — Windows Firewall public profile on"
  - check_number: "3.3.2"
    article: "Art. 32(1)(b)"
    requirement: "Availability — block inbound public connections"
  - check_number: "3.3.3"
    article: "Art. 32(1)(b)"
    requirement: "Availability — allow outbound public connections"

  # Cisco network security
  - check_number: "3.2.1"
    article: "Art. 32(1)(b)"
    requirement: "Integrity — disable directed-broadcast"
  - check_number: "3.2.2"
    article: "Art. 32(1)(b)"
    requirement: "Integrity — disable proxy-arp on external interfaces"
  - check_number: "3.2.3"
    article: "Art. 32(1)(b)"
    requirement: "Availability — ingress ACL on external interfaces"
  - check_number: "3.2.4"
    article: "Art. 32(1)(b)"
    requirement: "Availability — egress ACL on external interfaces"

  # macOS access controls
  - check_number: "2.4.3"
    article: "Art. 32(1)(b)"
    requirement: "Availability — macOS Firewall enabled"
  - check_number: "2.4.4"
    article: "Art. 32(1)(b)"
    requirement: "Availability — macOS Firewall stealth mode"
  - check_number: "2.5.1"
    article: "Art. 32(1)(b)"
    requirement: "Integrity — System Integrity Protection enabled"
  - check_number: "2.5.2"
    article: "Art. 32(1)(b)"
    requirement: "Integrity — Apple Mobile File Integrity enabled"

  # Windows password policies
  - check_number: "1.1.1"
    article: "Art. 32(1)(b)"
    requirement: "Confidentiality — enforce password history"
  - check_number: "1.1.2"
    article: "Art. 32(1)(b)"
    requirement: "Confidentiality — maximum password age"
  - check_number: "1.1.3"
    article: "Art. 32(1)(b)"
    requirement: "Confidentiality — minimum password age"
  - check_number: "1.1.4"
    article: "Art. 32(1)(b)"
    requirement: "Confidentiality — minimum password length"
  - check_number: "1.1.5"
    article: "Art. 32(1)(b)"
    requirement: "Confidentiality — password complexity requirements"
  - check_number: "1.1.6"
    article: "Art. 32(1)(b)"
    requirement: "Confidentiality — no reversible password encryption"
  - check_number: "1.2.1"
    article: "Art. 32(1)(b)"
    requirement: "Confidentiality — account lockout duration"
  - check_number: "1.2.2"
    article: "Art. 32(1)(b)"
    requirement: "Confidentiality — account lockout threshold"
  - check_number: "1.2.3"
    article: "Art. 32(1)(b)"
    requirement: "Confidentiality — lockout counter reset"

  # Windows access restrictions
  - check_number: "2.2.1"
    article: "Art. 32(1)(b)"
    requirement: "Confidentiality — deny network access to guests"
  - check_number: "2.2.2"
    article: "Art. 32(1)(b)"
    requirement: "Confidentiality — deny RDP access to guests"
  - check_number: "2.3.2"
    article: "Art. 32(1)(b)"
    requirement: "Confidentiality — rename administrator account"
  - check_number: "2.3.3"
    article: "Art. 32(1)(b)"
    requirement: "Confidentiality — rename guest account"
  - check_number: "2.3.4"
    article: "Art. 32(1)(b)"
    requirement: "Confidentiality — hide last logged-on user"
  - check_number: "2.3.5"
    article: "Art. 32(1)(b)"
    requirement: "Confidentiality — display logon warning message"

  # Windows RDP hardening
  - check_number: "18.3.1"
    article: "Art. 32(1)(b)"
    requirement: "Confidentiality — disable drive redirection in RDP"
  - check_number: "18.3.2"
    article: "Art. 32(1)(b)"
    requirement: "Confidentiality — always prompt for RDP password"

  # Cisco AAA
  - check_number: "1.1.1"
    article: "Art. 32(1)(b)"
    requirement: "Confidentiality — enable AAA new-model"
  - check_number: "1.1.2"
    article: "Art. 32(1)(b)"
    requirement: "Confidentiality — enable AAA authentication login"
  - check_number: "1.1.3"
    article: "Art. 32(1)(b)"
    requirement: "Confidentiality — enable AAA authentication enable"
  - check_number: "1.1.4"
    article: "Art. 32(1)(b)"
    requirement: "Confidentiality — set login authentication for console"
  - check_number: "1.1.5"
    article: "Art. 32(1)(b)"
    requirement: "Confidentiality — set login authentication for tty"
  - check_number: "1.1.6"
    article: "Art. 32(1)(b)"
    requirement: "Confidentiality — set login authentication for vty"
  - check_number: "1.2.1"
    article: "Art. 32(1)(b)"
    requirement: "Confidentiality — set privilege 1 for local users"
  - check_number: "1.2.2"
    article: "Art. 32(1)(b)"
    requirement: "Confidentiality — restrict vty to SSH only"
  - check_number: "1.2.4"
    article: "Art. 32(1)(b)"
    requirement: "Confidentiality — create access-list for vty"
  - check_number: "1.2.5"
    article: "Art. 32(1)(b)"
    requirement: "Confidentiality — set access-class for vty"
  - check_number: "1.4.1"
    article: "Art. 32(1)(b)"
    requirement: "Confidentiality — set enable secret password"
  - check_number: "1.4.2"
    article: "Art. 32(1)(b)"
    requirement: "Confidentiality — enable service password-encryption"
  - check_number: "1.4.3"
    article: "Art. 32(1)(b)"
    requirement: "Confidentiality — set username secret for all users"
  - check_number: "1.4.4"
    article: "Art. 32(1)(b)"
    requirement: "Confidentiality — minimum password length 10+"

  # macOS authentication
  - check_number: "5.1.1"
    article: "Art. 32(1)(b)"
    requirement: "Confidentiality — login window displays name & password"
  - check_number: "5.1.2"
    article: "Art. 32(1)(b)"
    requirement: "Confidentiality — disable password hints"
  - check_number: "5.1.3"
    article: "Art. 32(1)(b)"
    requirement: "Confidentiality — disable guest account"
  - check_number: "5.4"
    article: "Art. 32(1)(b)"
    requirement: "Confidentiality — require password on wake"
  - check_number: "5.6"
    article: "Art. 32(1)(b)"
    requirement: "Confidentiality — disable automatic login"
  - check_number: "6.1"
    article: "Art. 32(1)(b)"
    requirement: "Confidentiality — disable root account"
  - check_number: "6.2"
    article: "Art. 32(1)(b)"
    requirement: "Confidentiality — configure account lockout threshold"
  - check_number: "6.3"
    article: "Art. 32(1)(b)"
    requirement: "Confidentiality — configure minimum password length"

  # Linux boot/MAC security
  - check_number: "1.2.1"
    article: "Art. 32(1)(b)"
    requirement: "Integrity — bootloader password set"
  - check_number: "1.2.2"
    article: "Art. 32(1)(b)"
    requirement: "Integrity — bootloader config permissions"
  - check_number: "1.3.1"
    article: "Art. 32(1)(b)"
    requirement: "Integrity — SELinux/AIDE installed"
  - check_number: "1.3.2"
    article: "Art. 32(1)(b)"
    requirement: "Integrity — SELinux not disabled / filesystem integrity"
  - check_number: "1.4.1"
    article: "Art. 32(1)(b)"
    requirement: "Integrity — bootloader password / SELinux installed"
  - check_number: "1.4.2"
    article: "Art. 32(1)(b)"
    requirement: "Integrity — bootloader config / SELinux not disabled"

  # ==========================================================================
  # GDPR Article 32(1)(c) — Restore Availability After Incident
  # "the ability to restore the availability and access to personal data
  # in a timely manner in the event of a physical or technical incident"
  # ==========================================================================

  # Partition configuration (data isolation)
  - check_number: "1.1.4"
    article: "Art. 32(1)(c)"
    requirement: "Resilience — /tmp partition isolation"
  - check_number: "1.1.5"
    article: "Art. 32(1)(c)"
    requirement: "Resilience — /tmp noexec protection"
  - check_number: "1.1.6"
    article: "Art. 32(1)(c)"
    requirement: "Resilience — /tmp nosuid protection"
  - check_number: "1.1.7"
    article: "Art. 32(1)(c)"
    requirement: "Resilience — /var separate partition"
  - check_number: "1.1.2.1"
    article: "Art. 32(1)(c)"
    requirement: "Resilience — /tmp is a separate partition"
  - check_number: "1.1.3.1"
    article: "Art. 32(1)(c)"
    requirement: "Resilience — /var is a separate partition"
  - check_number: "1.1.4.1"
    article: "Art. 32(1)(c)"
    requirement: "Resilience — /var/tmp is a separate partition"
  - check_number: "1.1.5.1"
    article: "Art. 32(1)(c)"
    requirement: "Resilience — /var/log is a separate partition"
  - check_number: "1.1.6.1"
    article: "Art. 32(1)(c)"
    requirement: "Resilience — /home is a separate partition"

  # ==========================================================================
  # GDPR Article 32(1)(d) — Testing and Evaluating Effectiveness
  # "a process for regularly testing, assessing and evaluating the
  # effectiveness of technical and organisational measures"
  # ==========================================================================

  # Linux integrity checking
  - check_number: "1.3.1"
    article: "Art. 32(1)(d)"
    requirement: "Effectiveness testing — AIDE integrity checker installed"
  - check_number: "1.3.2"
    article: "Art. 32(1)(d)"
    requirement: "Effectiveness testing — filesystem integrity regularly checked"

  # SUID/SGID auditing
  - check_number: "6.2.1"
    article: "Art. 32(1)(d)"
    requirement: "Effectiveness testing — audit SUID executables"
  - check_number: "6.2.2"
    article: "Art. 32(1)(d)"
    requirement: "Effectiveness testing — audit SGID executables"
  - check_number: "6.2.4"
    article: "Art. 32(1)(d)"
    requirement: "Effectiveness testing — audit SUID/SGID executables"
  - check_number: "6.2.5"
    article: "Art. 32(1)(d)"
    requirement: "Effectiveness testing — audit SGID executables"

  # Windows Defender
  - check_number: "9.1.1"
    article: "Art. 32(1)(d)"
    requirement: "Effectiveness testing — Windows Defender AntiSpyware enabled"
  - check_number: "9.1.2"
    article: "Art. 32(1)(d)"
    requirement: "Effectiveness testing — real-time protection enabled"
  - check_number: "9.1.3"
    article: "Art. 32(1)(d)"
    requirement: "Effectiveness testing — behavior monitoring enabled"

  # ==========================================================================
  # GDPR Article 33 — Notification of Breach (Logging & Monitoring)
  # "notify the personal data breach to the supervisory authority ...
  # without undue delay and, where feasible, not later than 72 hours"
