  # ---------------------------------------------------------------------------
  # 19  Privacy and Telemetry
  # ---------------------------------------------------------------------------
  - number: "19"
    title: "Privacy and Telemetry"
    children:
      - number: "19.1"
        title: "Telemetry Settings"
        checks:
          - number: "19.1.1"
            title: "Ensure 'Allow Telemetry' is set to '0 - Security'"
            description: >
              This policy determines the amount of diagnostic and usage
              data reported to Microsoft. Enterprise edition supports
              the '0 - Security' level.
            rationale: >
              Minimizing telemetry reduces potentially sensitive data
              sent to external servers.
            level: 1
            scored: true
            audit_command: |
              Get-ItemProperty -Path "HKLM:\SOFTWARE\Policies\Microsoft\Windows\DataCollection" -Name "AllowTelemetry" -ErrorAction SilentlyContinue | Select-Object -ExpandProperty AllowTelemetry
            audit_steps: |
              1. Open the Group Policy Management Console (gpmc.msc).
              2. Navigate to Computer Configuration > Policies > Administrative Templates >
                 Windows Components > Data Collection and Preview Builds.
              3. Verify 'Allow Diagnostic Data' is set to '0 - Security'.
            expected_output: |
              0
            remediation: |
              Configure via Group Policy to '0 - Security [Enterprise Only]':
              Windows Components > Data Collection and Preview Builds >
              Allow Diagnostic Data

          - number: "19.1.2"
            title: "Ensure 'Do not show feedback notifications' is set to 'Enabled'"
            description: >
              This policy prevents devices from showing feedback
              questions from Microsoft.
            rationale: >
              Feedback notifications can transmit usage information
              and distract users.
            level: 1
            scored: true
            audit_command: |
              Get-ItemProperty -Path "HKLM:\SOFTWARE\Policies\Microsoft\Windows\DataCollection" -Name "DoNotShowFeedbackNotifications" -ErrorAction SilentlyContinue | Select-Object -ExpandProperty DoNotShowFeedbackNotifications
            audit_steps: |
              1. Open the Group Policy Management Console (gpmc.msc).
              2. Navigate to Windows Components > Data Collection and Preview Builds.
              3. Verify 'Do not show feedback notifications' is 'Enabled'.
            expected_output: |
              1
            remediation: |
              Configure via Group Policy to 'Enabled':
              Windows Components > Data Collection and Preview Builds >
              Do not show feedback notifications

          - number: "19.1.3"
            title: "Ensure 'Disable pre-release features or settings' is set to 'Enabled: Disabled'"
            description: >
              This policy controls whether pre-release features and
              settings are available on enterprise devices.
            rationale: >
              Pre-release features may introduce instability and
              security risks in production environments.
            level: 1
            scored: true
            audit_command: |
              Get-ItemProperty -Path "HKLM:\SOFTWARE\Policies\Microsoft\Windows\PreviewBuilds" -Name "EnableConfigFlighting" -ErrorAction SilentlyContinue | Select-Object -ExpandProperty EnableConfigFlighting
            audit_steps: |
              1. Open the Group Policy Management Console (gpmc.msc).
              2. Navigate to Windows Components > Data Collection and Preview Builds.
              3. Verify 'Toggle user control over Insider builds' is 'Disabled'.
            expected_output: |
              0
            remediation: |
              Configure via Group Policy to 'Disabled':
              Windows Components > Data Collection and Preview Builds >
              Toggle user control over Insider builds
