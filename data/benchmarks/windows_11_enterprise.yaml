benchmark:
  name: "CIS Microsoft Windows 11 Enterprise Benchmark"
  version: "3.0.0"
  platform: "windows-11"
  release_date: "2024-06-01"
  description: "Security configuration benchmark for Microsoft Windows 11 Enterprise (domain-joined)"
  url: "https://www.cisecurity.org/benchmark/microsoft_windows_desktop"

sections:
  # ---------------------------------------------------------------------------
  # 1  Account Policies
  # ---------------------------------------------------------------------------
  - number: "1"
    title: "Account Policies"
    children:
      - number: "1.1"
        title: "Password Policy"
        checks:
          - number: "1.1.1"
            title: "Ensure 'Enforce password history' is set to '24 or more password(s)'"
            description: >
              This policy setting determines the number of renewed, unique
              passwords before an old password can be reused.
            rationale: >
              Requiring unique passwords prevents users from cycling back
              to compromised passwords.
            level: 1
            scored: true
            audit_command: |
              net accounts | findstr /i "password history"
            audit_steps: |
              1. Open the Group Policy Management Console (gpmc.msc).
              2. Navigate to Computer Configuration > Policies > Windows Settings >
                 Security Settings > Account Policies > Password Policy.
              3. Verify 'Enforce password history' is '24 or more password(s)'.
            expected_output: |
              Length of password history maintained: 24 or more
            remediation: |
              Computer Configuration > Policies > Windows Settings > Security Settings >
              Account Policies > Password Policy > Enforce password history

          - number: "1.1.2"
            title: "Ensure 'Maximum password age' is set to '365 or fewer days, but not 0'"
            description: >
              Defines how long a user can use their password before it expires.
            rationale: >
              Periodic password changes reduce the window for compromised
              credentials.
            level: 1
            scored: true
            audit_command: |
              net accounts | findstr /i "Maximum password age"
            audit_steps: |
              1. Open the Group Policy Management Console (gpmc.msc).
              2. Navigate to Account Policies > Password Policy.
              3. Verify 'Maximum password age' is '365 or fewer days, but not 0'.
            expected_output: |
              Maximum password age (days): 365 or fewer, but not 0
            remediation: |
              Account Policies > Password Policy > Maximum password age

          - number: "1.1.3"
            title: "Ensure 'Minimum password age' is set to '1 or more day(s)'"
            description: >
              Determines the number of days before a password can be changed.
            rationale: >
              Prevents rapid password cycling.
            level: 1
            scored: true
            audit_command: |
              net accounts | findstr /i "Minimum password age"
            audit_steps: |
              1. Open the Group Policy Management Console (gpmc.msc).
              2. Navigate to Account Policies > Password Policy.
              3. Verify 'Minimum password age' is '1 or more day(s)'.
            expected_output: |
              Minimum password age (days): 1 or more
            remediation: |
              Account Policies > Password Policy > Minimum password age

          - number: "1.1.4"
            title: "Ensure 'Minimum password length' is set to '14 or more character(s)'"
            description: >
              Determines the least number of characters for a password.
            rationale: >
              Longer passwords are exponentially more resistant to brute-force.
            level: 1
            scored: true
            audit_command: |
              net accounts | findstr /i "Minimum password length"
            audit_steps: |
              1. Open the Group Policy Management Console (gpmc.msc).
              2. Navigate to Account Policies > Password Policy.
              3. Verify 'Minimum password length' is '14 or more'.
            expected_output: |
              Minimum password length: 14 or more
            remediation: |
              Account Policies > Password Policy > Minimum password length

          - number: "1.1.5"
            title: "Ensure 'Password must meet complexity requirements' is set to 'Enabled'"
            description: >
              Checks new passwords for strong password requirements.
            rationale: >
              Complex passwords are harder to crack.
            level: 1
            scored: true
            audit_command: |
              secedit /export /cfg C:\Windows\Temp\secpol.cfg /quiet
              findstr "PasswordComplexity" C:\Windows\Temp\secpol.cfg
              del C:\Windows\Temp\secpol.cfg
            audit_steps: |
              1. Open the Group Policy Management Console (gpmc.msc).
              2. Navigate to Account Policies > Password Policy.
              3. Verify complexity requirements is 'Enabled'.
            expected_output: |
              PasswordComplexity = 1
            remediation: |
              Account Policies > Password Policy > Password must meet complexity requirements

          - number: "1.1.6"
            title: "Ensure 'Store passwords using reversible encryption' is set to 'Disabled'"
            description: >
              Determines whether passwords are stored using reversible encryption.
            rationale: >
              Reversible encryption is essentially plaintext storage.
            level: 1
            scored: true
            audit_command: |
              secedit /export /cfg C:\Windows\Temp\secpol.cfg /quiet
              findstr "ClearTextPassword" C:\Windows\Temp\secpol.cfg
              del C:\Windows\Temp\secpol.cfg
            audit_steps: |
              1. Open the Group Policy Management Console (gpmc.msc).
              2. Navigate to Account Policies > Password Policy.
              3. Verify reversible encryption is 'Disabled'.
            expected_output: |
              ClearTextPassword = 0
            remediation: |
              Account Policies > Password Policy > Store passwords using reversible encryption

      - number: "1.2"
        title: "Account Lockout Policy"
        checks:
          - number: "1.2.1"
            title: "Ensure 'Account lockout duration' is set to '15 or more minute(s)'"
            description: >
              Determines the time before a locked account is unlocked.
            rationale: >
              A lockout duration balances security with usability.
            level: 1
            scored: true
            audit_command: |
              net accounts | findstr /i "Lockout duration"
            audit_steps: |
              1. Open the Group Policy Management Console (gpmc.msc).
              2. Navigate to Account Policies > Account Lockout Policy.
              3. Verify 'Account lockout duration' is '15 or more minute(s)'.
            expected_output: |
              Lockout duration (minutes): 15 or more
            remediation: |
              Account Policies > Account Lockout Policy > Account lockout duration

          - number: "1.2.2"
            title: "Ensure 'Account lockout threshold' is set to '5 or fewer invalid logon attempt(s), but not 0'"
            description: >
              Determines the number of failed logon attempts before lockout.
            rationale: >
              An account lockout threshold reduces brute-force success.
            level: 1
            scored: true
            audit_command: |
              net accounts | findstr /i "Lockout threshold"
            audit_steps: |
              1. Open the Group Policy Management Console (gpmc.msc).
              2. Navigate to Account Policies > Account Lockout Policy.
              3. Verify threshold is '5 or fewer, but not 0'.
            expected_output: |
              Lockout threshold: between 1 and 5
            remediation: |
              Account Policies > Account Lockout Policy > Account lockout threshold

          - number: "1.2.3"
            title: "Ensure 'Reset account lockout counter after' is set to '15 or more minute(s)'"
            description: >
              Determines the time before the lockout threshold resets.
            rationale: >
              A reasonable reset counter reduces accidental lockouts.
            level: 1
            scored: true
            audit_command: |
              net accounts | findstr /i "Lockout observation"
            audit_steps: |
              1. Open the Group Policy Management Console (gpmc.msc).
              2. Navigate to Account Policies > Account Lockout Policy.
              3. Verify 'Reset account lockout counter after' is '15 or more'.
            expected_output: |
              Lockout observation window (minutes): 15 or more
            remediation: |
              Account Policies > Account Lockout Policy > Reset account lockout counter after

  # ---------------------------------------------------------------------------
  # 2  Local Policies
  # ---------------------------------------------------------------------------
  - number: "2"
    title: "Local Policies"
    children:
      - number: "2.1"
        title: "Audit Policy"
        checks:
          - number: "2.1.1"
            title: "Ensure 'Audit Credential Validation' is set to 'Success and Failure'"
            description: >
              Reports results of credential validation tests.
            rationale: >
              Auditing credential validation provides visibility into
              authentication attempts.
            level: 1
            scored: true
            audit_command: |
              auditpol /get /subcategory:"Credential Validation"
            audit_steps: |
              1. Open the Group Policy Management Console (gpmc.msc).
              2. Navigate to Advanced Audit Policy Configuration >
                 Account Logon > Audit Credential Validation.
              3. Verify 'Success and Failure'.
            expected_output: |
              Credential Validation    Success and Failure
            remediation: |
              Advanced Audit Policy Configuration > Account Logon >
              Audit Credential Validation = Success and Failure

          - number: "2.1.2"
            title: "Ensure 'Audit Logon' is set to 'Success and Failure'"
            description: >
              Audits user account logon attempts.
            rationale: >
              Tracking logon events detects unauthorized access.
            level: 1
            scored: true
            audit_command: |
              auditpol /get /subcategory:"Logon"
            audit_steps: |
              1. Open the Group Policy Management Console (gpmc.msc).
              2. Navigate to Advanced Audit Policy Configuration >
                 Logon/Logoff > Audit Logon.
              3. Verify 'Success and Failure'.
            expected_output: |
              Logon    Success and Failure
            remediation: |
              Advanced Audit Policy Configuration > Logon/Logoff >
              Audit Logon = Success and Failure

          - number: "2.1.3"
            title: "Ensure 'Audit Logoff' is set to 'Success'"
            description: >
              Audits logon session close events.
            rationale: >
              Correlates user sessions and detects anomalies.
            level: 1
            scored: true
            audit_command: |
              auditpol /get /subcategory:"Logoff"
            audit_steps: |
              1. Open the Group Policy Management Console (gpmc.msc).
              2. Navigate to Advanced Audit Policy Configuration >
                 Logon/Logoff > Audit Logoff.
              3. Verify 'Success'.
            expected_output: |
              Logoff    Success
            remediation: |
              Advanced Audit Policy Configuration > Logon/Logoff >
              Audit Logoff = Success

          - number: "2.1.4"
            title: "Ensure 'Audit Account Lockout' is set to 'Failure'"
            description: >
              Audits account lockout events.
            rationale: >
              Detects brute-force password attacks.
            level: 1
            scored: true
            audit_command: |
              auditpol /get /subcategory:"Account Lockout"
            audit_steps: |
              1. Open the Group Policy Management Console (gpmc.msc).
              2. Navigate to Advanced Audit Policy Configuration >
                 Logon/Logoff > Audit Account Lockout.
              3. Verify 'Failure'.
            expected_output: |
              Account Lockout    Failure
            remediation: |
              Advanced Audit Policy Configuration > Logon/Logoff >
              Audit Account Lockout = Failure

          - number: "2.1.5"
            title: "Ensure 'Audit Policy Change' is set to 'Success and Failure'"
            description: >
              Audits changes to security audit policy settings.
            rationale: >
              Ensures security policy modifications are tracked.
            level: 1
            scored: true
            audit_command: |
              auditpol /get /subcategory:"Audit Policy Change"
            audit_steps: |
              1. Open the Group Policy Management Console (gpmc.msc).
              2. Navigate to Advanced Audit Policy Configuration >
                 Policy Change > Audit Policy Change.
              3. Verify 'Success and Failure'.
            expected_output: |
              Audit Policy Change    Success and Failure
            remediation: |
              Advanced Audit Policy Configuration > Policy Change >
              Audit Policy Change = Success and Failure

          - number: "2.1.6"
            title: "Ensure 'Audit User Account Management' is set to 'Success and Failure'"
            description: >
              Audits user account changes.
            rationale: >
              Provides visibility into administrative account actions.
            level: 1
            scored: true
            audit_command: |
              auditpol /get /subcategory:"User Account Management"
            audit_steps: |
              1. Open the Group Policy Management Console (gpmc.msc).
              2. Navigate to Advanced Audit Policy Configuration >
                 Account Management > Audit User Account Management.
              3. Verify 'Success and Failure'.
            expected_output: |
              User Account Management    Success and Failure
            remediation: |
              Advanced Audit Policy Configuration > Account Management >
              Audit User Account Management = Success and Failure

          - number: "2.1.7"
            title: "Ensure 'Audit Security Group Management' is set to 'Success'"
            description: >
              Audits security group changes.
            rationale: >
              Detects unauthorized privilege escalation.
            level: 1
            scored: true
            audit_command: |
              auditpol /get /subcategory:"Security Group Management"
            audit_steps: |
              1. Open the Group Policy Management Console (gpmc.msc).
              2. Navigate to Advanced Audit Policy Configuration >
                 Account Management > Audit Security Group Management.
              3. Verify 'Success'.
            expected_output: |
              Security Group Management    Success
            remediation: |
              Advanced Audit Policy Configuration > Account Management >
              Audit Security Group Management = Success

          - number: "2.1.8"
            title: "Ensure 'Audit Process Creation' is set to 'Success'"
            description: >
              Audits process creation events.
            rationale: >
              Provides visibility into program execution.
            level: 1
            scored: true
            audit_command: |
              auditpol /get /subcategory:"Process Creation"
            audit_steps: |
              1. Open the Group Policy Management Console (gpmc.msc).
              2. Navigate to Advanced Audit Policy Configuration >
                 Detailed Tracking > Audit Process Creation.
              3. Verify 'Success'.
            expected_output: |
              Process Creation    Success
            remediation: |
              Advanced Audit Policy Configuration > Detailed Tracking >
              Audit Process Creation = Success

          - number: "2.1.9"
            title: "Ensure 'Audit Kerberos Authentication Service' is set to 'Success and Failure'"
            description: >
              Audits Kerberos TGT requests.
            rationale: >
              Detects Pass-the-Ticket and Golden Ticket attacks in
              domain environments.
            level: 1
            scored: true
            audit_command: |
              auditpol /get /subcategory:"Kerberos Authentication Service"
            audit_steps: |
              1. Open the Group Policy Management Console (gpmc.msc).
              2. Navigate to Advanced Audit Policy Configuration >
                 Account Logon > Audit Kerberos Authentication Service.
              3. Verify 'Success and Failure'.
            expected_output: |
              Kerberos Authentication Service    Success and Failure
            remediation: |
              Advanced Audit Policy Configuration > Account Logon >
              Audit Kerberos Authentication Service = Success and Failure

          - number: "2.1.10"
            title: "Ensure 'Audit Kerberos Service Ticket Operations' is set to 'Success and Failure'"
            description: >
              Audits Kerberos service ticket requests.
            rationale: >
              Detects Kerberoasting attacks.
            level: 1
            scored: true
            audit_command: |
              auditpol /get /subcategory:"Kerberos Service Ticket Operations"
            audit_steps: |
              1. Open the Group Policy Management Console (gpmc.msc).
              2. Navigate to Advanced Audit Policy Configuration >
                 Account Logon > Audit Kerberos Service Ticket Operations.
              3. Verify 'Success and Failure'.
            expected_output: |
              Kerberos Service Ticket Operations    Success and Failure
            remediation: |
              Advanced Audit Policy Configuration > Account Logon >
              Audit Kerberos Service Ticket Operations = Success and Failure

      - number: "2.2"
        title: "User Rights Assignment"
        checks:
          - number: "2.2.1"
            title: "Ensure 'Access this computer from the network' is set to 'Administrators, Remote Desktop Users'"
            description: >
              Determines which users can connect from the network.
            rationale: >
              Restricting network access limits the attack surface.
            level: 1
            scored: true
            audit_command: |
              secedit /export /cfg C:\Windows\Temp\secpol.cfg /quiet
              findstr "SeNetworkLogonRight" C:\Windows\Temp\secpol.cfg
              del C:\Windows\Temp\secpol.cfg
            audit_steps: |
              1. Open the Group Policy Management Console (gpmc.msc).
              2. Navigate to Local Policies > User Rights Assignment.
              3. Verify 'Access this computer from the network' includes only
                 Administrators and Remote Desktop Users.
            expected_output: |
              SeNetworkLogonRight = *S-1-5-32-544,*S-1-5-32-555
            remediation: |
              Local Policies > User Rights Assignment >
              Access this computer from the network

          - number: "2.2.2"
            title: "Ensure 'Deny access to this computer from the network' includes 'Guests, Local account and member of Administrators group'"
            description: >
              Prevents specified users from network connections.
            rationale: >
              In a domain, local admin accounts should not be used for
              network access to prevent lateral movement.
            level: 1
            scored: true
            audit_command: |
              secedit /export /cfg C:\Windows\Temp\secpol.cfg /quiet
              findstr "SeDenyNetworkLogonRight" C:\Windows\Temp\secpol.cfg
              del C:\Windows\Temp\secpol.cfg
            audit_steps: |
              1. Open the Group Policy Management Console (gpmc.msc).
              2. Navigate to Local Policies > User Rights Assignment.
              3. Verify setting includes Guests and Local account and member of
                 Administrators group.
            expected_output: |
              SeDenyNetworkLogonRight = *S-1-5-32-546,*S-1-5-114
            remediation: |
              Local Policies > User Rights Assignment >
              Deny access to this computer from the network

          - number: "2.2.3"
            title: "Ensure 'Deny log on through Remote Desktop Services' includes 'Guests, Local account'"
            description: >
              Prevents specified users from RDP access.
            rationale: >
              Prevents unauthorized remote sessions.
            level: 1
            scored: true
            audit_command: |
              secedit /export /cfg C:\Windows\Temp\secpol.cfg /quiet
              findstr "SeDenyRemoteInteractiveLogonRight" C:\Windows\Temp\secpol.cfg
              del C:\Windows\Temp\secpol.cfg
            audit_steps: |
              1. Open the Group Policy Management Console (gpmc.msc).
              2. Navigate to Local Policies > User Rights Assignment.
              3. Verify setting includes Guests and Local account.
            expected_output: |
              SeDenyRemoteInteractiveLogonRight = *S-1-5-32-546,*S-1-5-113
            remediation: |
              Local Policies > User Rights Assignment >
              Deny log on through Remote Desktop Services

      - number: "2.3"
        title: "Security Options"
        checks:
          - number: "2.3.1"
            title: "Ensure 'Accounts: Administrator account status' is set to 'Disabled'"
            description: >
              Enables or disables the built-in Administrator account.
            rationale: >
              The built-in Administrator is a well-known attack target.
            level: 1
            scored: true
            audit_command: |
              Get-LocalUser -Name "Administrator" | Select-Object -ExpandProperty Enabled
            audit_steps: |
              1. Open the Group Policy Management Console (gpmc.msc).
              2. Navigate to Local Policies > Security Options.
              3. Verify 'Accounts: Administrator account status' is 'Disabled'.
            expected_output: |
              False
            remediation: |
              Local Policies > Security Options >
              Accounts: Administrator account status = Disabled

          - number: "2.3.2"
            title: "Ensure 'Accounts: Guest account status' is set to 'Disabled'"
            description: >
              Determines whether the Guest account is enabled.
            rationale: >
              The Guest account allows unauthenticated access.
            level: 1
            scored: true
            audit_command: |
              Get-LocalUser -Name "Guest" | Select-Object -ExpandProperty Enabled
            audit_steps: |
              1. Open the Group Policy Management Console (gpmc.msc).
              2. Navigate to Local Policies > Security Options.
              3. Verify 'Accounts: Guest account status' is 'Disabled'.
            expected_output: |
              False
            remediation: |
              Local Policies > Security Options >
              Accounts: Guest account status = Disabled

          - number: "2.3.3"
            title: "Ensure 'Interactive logon: Do not display last user name' is set to 'Enabled'"
            description: >
              Controls whether the last logged-on user name is displayed.
            rationale: >
              Displaying usernames aids password attacks.
            level: 1
            scored: true
            audit_command: |
              Get-ItemProperty -Path "HKLM:\SOFTWARE\Microsoft\Windows\CurrentVersion\Policies\System" -Name "DontDisplayLastUserName" -ErrorAction SilentlyContinue | Select-Object -ExpandProperty DontDisplayLastUserName
            audit_steps: |
              1. Open the Group Policy Management Console (gpmc.msc).
              2. Navigate to Local Policies > Security Options.
              3. Verify setting is 'Enabled'.
            expected_output: |
              1
            remediation: |
              Local Policies > Security Options >
              Interactive logon: Do not display last user name = Enabled

          - number: "2.3.4"
            title: "Ensure 'Interactive logon: Machine inactivity limit' is set to '900 or fewer second(s)'"
            description: >
              Specifies idle time before machine locks.
            rationale: >
              Auto-lock protects unattended workstations.
            level: 1
            scored: true
            audit_command: |
              Get-ItemProperty -Path "HKLM:\SOFTWARE\Microsoft\Windows\CurrentVersion\Policies\System" -Name "InactivityTimeoutSecs" -ErrorAction SilentlyContinue | Select-Object -ExpandProperty InactivityTimeoutSecs
            audit_steps: |
              1. Open the Group Policy Management Console (gpmc.msc).
              2. Navigate to Local Policies > Security Options.
              3. Verify machine inactivity limit is '900 or fewer'.
            expected_output: |
              900 or fewer (but not 0)
            remediation: |
              Local Policies > Security Options >
              Interactive logon: Machine inactivity limit

          - number: "2.3.5"
            title: "Ensure 'Microsoft network client: Digitally sign communications (always)' is set to 'Enabled'"
            description: >
              Determines whether SMB client packet signing is required.
            rationale: >
              SMB signing prevents session hijacking.
            level: 1
            scored: true
            audit_command: |
              Get-ItemProperty -Path "HKLM:\SYSTEM\CurrentControlSet\Services\LanmanWorkstation\Parameters" -Name "RequireSecuritySignature" -ErrorAction SilentlyContinue | Select-Object -ExpandProperty RequireSecuritySignature
            audit_steps: |
              1. Open the Group Policy Management Console (gpmc.msc).
              2. Navigate to Local Policies > Security Options.
              3. Verify 'Microsoft network client: Digitally sign communications (always)' is 'Enabled'.
            expected_output: |
              1
            remediation: |
              Local Policies > Security Options >
              Microsoft network client: Digitally sign communications (always) = Enabled

          - number: "2.3.6"
            title: "Ensure 'Network access: Do not allow anonymous enumeration of SAM accounts' is set to 'Enabled'"
            description: >
              Controls anonymous SAM account enumeration.
            rationale: >
              Prevents reconnaissance through anonymous access.
            level: 1
            scored: true
            audit_command: |
              Get-ItemProperty -Path "HKLM:\SYSTEM\CurrentControlSet\Control\Lsa" -Name "RestrictAnonymousSAM" -ErrorAction SilentlyContinue | Select-Object -ExpandProperty RestrictAnonymousSAM
            audit_steps: |
              1. Open the Group Policy Management Console (gpmc.msc).
              2. Navigate to Local Policies > Security Options.
              3. Verify setting is 'Enabled'.
            expected_output: |
              1
            remediation: |
              Local Policies > Security Options >
              Network access: Do not allow anonymous enumeration of SAM accounts = Enabled

          - number: "2.3.7"
            title: "Ensure 'User Account Control: Admin Approval Mode for the Built-in Administrator account' is set to 'Enabled'"
            description: >
              Controls Admin Approval Mode for the built-in Administrator.
            rationale: >
              Without this, the built-in admin runs everything with full privileges.
            level: 1
            scored: true
            audit_command: |
              Get-ItemProperty -Path "HKLM:\SOFTWARE\Microsoft\Windows\CurrentVersion\Policies\System" -Name "FilterAdministratorToken" -ErrorAction SilentlyContinue | Select-Object -ExpandProperty FilterAdministratorToken
            audit_steps: |
              1. Open the Group Policy Management Console (gpmc.msc).
              2. Navigate to Local Policies > Security Options.
              3. Verify UAC Admin Approval Mode is 'Enabled'.
            expected_output: |
              1
            remediation: |
              Local Policies > Security Options >
              User Account Control: Admin Approval Mode for the Built-in Administrator account = Enabled

          - number: "2.3.8"
            title: "Ensure 'User Account Control: Run all administrators in Admin Approval Mode' is set to 'Enabled'"
            description: >
              Master switch for UAC.
            rationale: >
              If disabled, UAC is effectively off.
            level: 1
            scored: true
            audit_command: |
              Get-ItemProperty -Path "HKLM:\SOFTWARE\Microsoft\Windows\CurrentVersion\Policies\System" -Name "EnableLUA" -ErrorAction SilentlyContinue | Select-Object -ExpandProperty EnableLUA
            audit_steps: |
              1. Open the Group Policy Management Console (gpmc.msc).
              2. Navigate to Local Policies > Security Options.
              3. Verify 'Run all administrators in Admin Approval Mode' is 'Enabled'.
            expected_output: |
              1
            remediation: |
              Local Policies > Security Options >
              User Account Control: Run all administrators in Admin Approval Mode = Enabled

  # ---------------------------------------------------------------------------
  # 5  Windows Firewall with Advanced Security
  # ---------------------------------------------------------------------------
  - number: "5"
    title: "Windows Firewall with Advanced Security"
    children:
      - number: "5.1"
        title: "Domain Profile"
        checks:
          - number: "5.1.1"
            title: "Ensure 'Windows Firewall: Domain: Firewall state' is set to 'On'"
            description: >
              Controls whether Windows Firewall is on for Domain profile.
            rationale: >
              An off firewall leaves the system vulnerable.
            level: 1
            scored: true
            audit_command: |
              netsh advfirewall show domainprofile state
            audit_steps: |
              1. Open Windows Defender Firewall with Advanced Security.
              2. Verify Domain Profile Firewall state is 'On'.
            expected_output: |
              State    ON
            remediation: |
              Set Domain Profile Firewall state to 'On'.

          - number: "5.1.2"
            title: "Ensure 'Windows Firewall: Domain: Inbound connections' is set to 'Block (default)'"
            description: >
              Determines inbound connection behavior for Domain profile.
            rationale: >
              Block by default ensures only allowed traffic reaches the system.
            level: 1
            scored: true
            audit_command: |
              netsh advfirewall show domainprofile firewallpolicy
            audit_steps: |
              1. Verify Domain Profile inbound connections are 'Block (default)'.
            expected_output: |
              Inbound policy    BlockInbound
            remediation: |
              Set Domain Profile inbound connections to 'Block (default)'.

      - number: "5.2"
        title: "Private Profile"
        checks:
          - number: "5.2.1"
            title: "Ensure 'Windows Firewall: Private: Firewall state' is set to 'On'"
            description: >
              Controls whether Windows Firewall is on for Private profile.
            rationale: >
              Firewall should be enabled on all profiles.
            level: 1
            scored: true
            audit_command: |
              netsh advfirewall show privateprofile state
            audit_steps: |
              1. Verify Private Profile Firewall state is 'On'.
            expected_output: |
              State    ON
            remediation: |
              Set Private Profile Firewall state to 'On'.

          - number: "5.2.2"
            title: "Ensure 'Windows Firewall: Private: Inbound connections' is set to 'Block (default)'"
            description: >
              Determines inbound behavior on Private profile.
            rationale: >
              Defense-in-depth on private networks.
            level: 1
            scored: true
            audit_command: |
              netsh advfirewall show privateprofile firewallpolicy
            audit_steps: |
              1. Verify Private Profile inbound connections are 'Block (default)'.
            expected_output: |
              Inbound policy    BlockInbound
            remediation: |
              Set Private Profile inbound connections to 'Block (default)'.

      - number: "5.3"
        title: "Public Profile"
        checks:
          - number: "5.3.1"
            title: "Ensure 'Windows Firewall: Public: Firewall state' is set to 'On'"
            description: >
              Controls whether Windows Firewall is on for Public profile.
            rationale: >
              Public networks are untrusted; firewall must be on.
            level: 1
            scored: true
            audit_command: |
              netsh advfirewall show publicprofile state
            audit_steps: |
              1. Verify Public Profile Firewall state is 'On'.
            expected_output: |
              State    ON
            remediation: |
              Set Public Profile Firewall state to 'On'.

          - number: "5.3.2"
            title: "Ensure 'Windows Firewall: Public: Inbound connections' is set to 'Block (default)'"
            description: >
              Determines inbound behavior on Public profile.
            rationale: >
              All inbound on public networks should be blocked.
            level: 1
            scored: true
            audit_command: |
              netsh advfirewall show publicprofile firewallpolicy
            audit_steps: |
              1. Verify Public Profile inbound connections are 'Block (default)'.
            expected_output: |
              Inbound policy    BlockInbound
            remediation: |
              Set Public Profile inbound connections to 'Block (default)'.

  # ---------------------------------------------------------------------------
  # 9  Windows Defender and Security
  # ---------------------------------------------------------------------------
  - number: "9"
    title: "Windows Defender and Security"
    children:
      - number: "9.1"
        title: "Windows Defender Antivirus"
        checks:
          - number: "9.1.1"
            title: "Ensure 'Turn off Windows Defender AntiVirus' is set to 'Disabled'"
            description: >
              Turns off Microsoft Defender Antivirus.
            rationale: >
              Disabling Defender removes real-time protection.
            level: 1
            scored: true
            audit_command: |
              Get-ItemProperty -Path "HKLM:\SOFTWARE\Policies\Microsoft\Windows Defender" -Name "DisableAntiSpyware" -ErrorAction SilentlyContinue | Select-Object -ExpandProperty DisableAntiSpyware
            audit_steps: |
              1. Open the Group Policy Management Console (gpmc.msc).
              2. Navigate to Windows Components > Microsoft Defender Antivirus.
              3. Verify 'Turn off Microsoft Defender Antivirus' is 'Disabled'.
            expected_output: |
              0 (or not configured)
            remediation: |
              Windows Components > Microsoft Defender Antivirus >
              Turn off Microsoft Defender Antivirus = Disabled

          - number: "9.1.2"
            title: "Ensure 'Configure real-time protection' is set to 'Enabled'"
            description: >
              Enables real-time malware detection.
            rationale: >
              Real-time protection detects threats as they occur.
            level: 1
            scored: true
            audit_command: |
              Get-ItemProperty -Path "HKLM:\SOFTWARE\Policies\Microsoft\Windows Defender\Real-Time Protection" -Name "DisableRealtimeMonitoring" -ErrorAction SilentlyContinue | Select-Object -ExpandProperty DisableRealtimeMonitoring
            audit_steps: |
              1. Open the Group Policy Management Console (gpmc.msc).
              2. Navigate to Windows Components > Microsoft Defender Antivirus > Real-time Protection.
              3. Verify 'Turn off real-time protection' is 'Disabled'.
            expected_output: |
              0 (or not configured)
            remediation: |
              Windows Components > Microsoft Defender Antivirus >
              Real-time Protection > Turn off real-time protection = Disabled

      - number: "9.2"
        title: "Credential Guard"
        checks:
          - number: "9.2.1"
            title: "Ensure 'Turn On Virtualization Based Security' is set to 'Enabled'"
            description: >
              VBS uses the Windows Hypervisor for security services.
            rationale: >
              VBS is required for Credential Guard, which protects
              domain credentials from theft.
            level: 1
            scored: true
            audit_command: |
              Get-ItemProperty -Path "HKLM:\SOFTWARE\Policies\Microsoft\Windows\DeviceGuard" -Name "EnableVirtualizationBasedSecurity" -ErrorAction SilentlyContinue | Select-Object -ExpandProperty EnableVirtualizationBasedSecurity
            audit_steps: |
              1. Open the Group Policy Management Console (gpmc.msc).
              2. Navigate to Computer Configuration > Policies > Administrative Templates >
                 System > Device Guard.
              3. Verify 'Turn On Virtualization Based Security' is 'Enabled'.
            expected_output: |
              1
            remediation: |
              System > Device Guard > Turn On Virtualization Based Security = Enabled

          - number: "9.2.2"
            title: "Ensure 'Credential Guard Configuration' is set to 'Enabled with UEFI lock'"
            description: >
              Credential Guard uses VBS to isolate secrets so only
              privileged system software can access them.
            rationale: >
              Prevents Pass-the-Hash and Pass-the-Ticket attacks by
              isolating NTLM hashes and Kerberos tickets.
            level: 1
            scored: true
            audit_command: |
              Get-ItemProperty -Path "HKLM:\SOFTWARE\Policies\Microsoft\Windows\DeviceGuard" -Name "LsaCfgFlags" -ErrorAction SilentlyContinue | Select-Object -ExpandProperty LsaCfgFlags
            audit_steps: |
              1. Open the Group Policy Management Console (gpmc.msc).
              2. Navigate to System > Device Guard.
              3. Verify Credential Guard Configuration is 'Enabled with UEFI lock'.
            expected_output: |
              1
            remediation: |
              System > Device Guard > Turn On Virtualization Based Security >
              Credential Guard Configuration = Enabled with UEFI lock

      - number: "9.3"
        title: "Enhanced Sign-in Security"
        checks:
          - number: "9.3.1"
            title: "Ensure 'Enhanced Sign-in Security (ESS)' is enabled for Windows Hello"
            description: >
              ESS provides additional protection for biometric data
              used with Windows Hello. Windows 11-specific feature.
            rationale: >
              ESS uses specialized hardware to protect biometric data,
              preventing extraction attacks.
            level: 1
            scored: true
            audit_command: |
              Get-ItemProperty -Path "HKLM:\SYSTEM\CurrentControlSet\Control\DeviceGuard\Capabilities" -Name "EnhancedSignInSecurity" -ErrorAction SilentlyContinue | Select-Object -ExpandProperty EnhancedSignInSecurity
            audit_steps: |
              1. Open Settings > Accounts > Sign-in options.
              2. Verify Enhanced Sign-in Security is enabled.
            expected_output: |
              1
            remediation: |
              Enable Enhanced Sign-in Security through Windows Security settings
              or via compatible VBS-capable hardware.

      - number: "9.4"
        title: "Smart App Control"
        checks:
          - number: "9.4.1"
            title: "Ensure 'Smart App Control' is set to 'On' or 'Evaluation'"
            description: >
              Smart App Control is a Windows 11-specific security feature
              that blocks untrusted and potentially dangerous applications.
            rationale: >
              Smart App Control provides an additional layer of protection
              by blocking applications that are unsigned or untrusted.
            level: 1
            scored: true
            audit_command: |
              Get-ItemProperty -Path "HKLM:\SYSTEM\CurrentControlSet\Control\CI\Policy" -Name "VerifiedAndReputablePolicyState" -ErrorAction SilentlyContinue | Select-Object -ExpandProperty VerifiedAndReputablePolicyState
            audit_steps: |
              1. Open Windows Security > App & browser control.
              2. Verify Smart App Control is set to 'On' or 'Evaluation'.
            expected_output: |
              1 (Evaluation) or 2 (On)
            remediation: |
              Enable Smart App Control via Windows Security > App & browser control.
              Note: Smart App Control can only be enabled on a clean Windows 11 install.

  # ---------------------------------------------------------------------------
  # 3  Network Configuration
  # ---------------------------------------------------------------------------
  - number: "3"
    title: "Network Configuration"
    children:
      - number: "3.1"
        title: "SMB Hardening"
        checks:
          - number: "3.1.1"
            title: "Ensure 'SMB v1 client' is set to 'Disabled'"
            description: >
              SMB v1 is a legacy protocol with known vulnerabilities.
            rationale: >
              SMB v1 has been exploited by ransomware and should be disabled.
            level: 1
            scored: true
            audit_command: |
              Get-WindowsOptionalFeature -Online -FeatureName SMB1Protocol | Select-Object -ExpandProperty State
            audit_steps: |
              1. Open PowerShell as Administrator.
              2. Run: Get-WindowsOptionalFeature -Online -FeatureName SMB1Protocol
              3. Verify State is 'Disabled'.
            expected_output: |
              Disabled
            remediation: |
              Disable-WindowsOptionalFeature -Online -FeatureName SMB1Protocol -NoRestart

          - number: "3.1.2"
            title: "Ensure 'SMB v1 server' is set to 'Disabled'"
            description: >
              Controls whether the SMB v1 server is enabled.
            rationale: >
              SMB v1 server should be disabled to prevent exploitation.
            level: 1
            scored: true
            audit_command: |
              Get-SmbServerConfiguration | Select-Object -ExpandProperty EnableSMB1Protocol
            audit_steps: |
              1. Open PowerShell as Administrator.
              2. Run: Get-SmbServerConfiguration | Select-Object EnableSMB1Protocol
              3. Verify 'False'.
            expected_output: |
              False
            remediation: |
              Set-SmbServerConfiguration -EnableSMB1Protocol $false -Force

          - number: "3.1.3"
            title: "Ensure 'SMB signing' is required"
            description: >
              Determines whether SMB server packet signing is required.
            rationale: >
              SMB signing prevents man-in-the-middle attacks.
            level: 1
            scored: true
            audit_command: |
              Get-ItemProperty -Path "HKLM:\SYSTEM\CurrentControlSet\Services\LanManServer\Parameters" -Name "RequireSecuritySignature" -ErrorAction SilentlyContinue | Select-Object -ExpandProperty RequireSecuritySignature
            audit_steps: |
              1. Open the Group Policy Management Console (gpmc.msc).
              2. Navigate to Local Policies > Security Options.
              3. Verify 'Microsoft network server: Digitally sign communications (always)' is 'Enabled'.
            expected_output: |
              1
            remediation: |
              Local Policies > Security Options >
              Microsoft network server: Digitally sign communications (always) = Enabled

      - number: "3.2"
        title: "NTLM Hardening"
        checks:
          - number: "3.2.1"
            title: "Ensure 'Network security: LAN Manager authentication level' is set to 'Send NTLMv2 response only. Refuse LM & NTLM'"
            description: >
              Determines authentication protocol for network logons.
            rationale: >
              NTLMv1 and LM are weaker than NTLMv2.
            level: 1
            scored: true
            audit_command: |
              Get-ItemProperty -Path "HKLM:\SYSTEM\CurrentControlSet\Control\Lsa" -Name "LmCompatibilityLevel" -ErrorAction SilentlyContinue | Select-Object -ExpandProperty LmCompatibilityLevel
            audit_steps: |
              1. Open the Group Policy Management Console (gpmc.msc).
              2. Navigate to Local Policies > Security Options.
              3. Verify LAN Manager authentication level is
                 'Send NTLMv2 response only. Refuse LM & NTLM'.
            expected_output: |
              5
            remediation: |
              Local Policies > Security Options >
              Network security: LAN Manager authentication level

          - number: "3.2.2"
            title: "Ensure 'Network security: Restrict NTLM: Audit Incoming NTLM Traffic' is set to 'Enable auditing for all accounts'"
            description: >
              Audits incoming NTLM traffic to identify NTLM-dependent apps.
            rationale: >
              In enterprise environments, NTLM usage should be monitored
              to reduce NTLM dependency.
            level: 1
            scored: true
            audit_command: |
              Get-ItemProperty -Path "HKLM:\SYSTEM\CurrentControlSet\Control\Lsa\MSV1_0" -Name "AuditReceivingNTLMTraffic" -ErrorAction SilentlyContinue | Select-Object -ExpandProperty AuditReceivingNTLMTraffic
            audit_steps: |
              1. Open the Group Policy Management Console (gpmc.msc).
              2. Navigate to Local Policies > Security Options.
              3. Verify NTLM audit setting.
            expected_output: |
              2
            remediation: |
              Local Policies > Security Options >
              Network security: Restrict NTLM: Audit Incoming NTLM Traffic

      - number: "3.3"
        title: "Remote Desktop Hardening"
        checks:
          - number: "3.3.1"
            title: "Ensure 'Do not allow drive redirection' for RDP is set to 'Enabled'"
            description: >
              Prevents sharing local drives with RDP servers.
            rationale: >
              Drive redirection could allow data exfiltration.
            level: 1
            scored: true
            audit_command: |
              Get-ItemProperty -Path "HKLM:\SOFTWARE\Policies\Microsoft\Windows NT\Terminal Services" -Name "fDisableCdm" -ErrorAction SilentlyContinue | Select-Object -ExpandProperty fDisableCdm
            audit_steps: |
              1. Open the Group Policy Management Console (gpmc.msc).
              2. Navigate to Windows Components > Remote Desktop Services >
                 Remote Desktop Session Host > Device and Resource Redirection.
              3. Verify 'Do not allow drive redirection' is 'Enabled'.
            expected_output: |
              1
            remediation: |
              Windows Components > Remote Desktop Services >
              Remote Desktop Session Host > Device and Resource Redirection >
              Do not allow drive redirection = Enabled

          - number: "3.3.2"
            title: "Ensure 'Always prompt for password upon connection' for RDP is set to 'Enabled'"
            description: >
              Specifies whether RDP always prompts for a password.
            rationale: >
              Prevents use of cached credentials for unauthorized sessions.
            level: 1
            scored: true
            audit_command: |
              Get-ItemProperty -Path "HKLM:\SOFTWARE\Policies\Microsoft\Windows NT\Terminal Services" -Name "fPromptForPassword" -ErrorAction SilentlyContinue | Select-Object -ExpandProperty fPromptForPassword
            audit_steps: |
              1. Open the Group Policy Management Console (gpmc.msc).
              2. Navigate to Windows Components > Remote Desktop Services >
                 Remote Desktop Session Host > Security.
              3. Verify 'Always prompt for password upon connection' is 'Enabled'.
            expected_output: |
              1
            remediation: |
              Windows Components > Remote Desktop Services >
              Remote Desktop Session Host > Security >
              Always prompt for password upon connection = Enabled

          - number: "3.3.3"
            title: "Ensure 'Require Network Level Authentication' for RDP is set to 'Enabled'"
            description: >
              Requires NLA for remote connections.
            rationale: >
              NLA authenticates before establishing full RDP connection.
            level: 1
            scored: true
            audit_command: |
              Get-ItemProperty -Path "HKLM:\SOFTWARE\Policies\Microsoft\Windows NT\Terminal Services" -Name "UserAuthentication" -ErrorAction SilentlyContinue | Select-Object -ExpandProperty UserAuthentication
            audit_steps: |
              1. Open the Group Policy Management Console (gpmc.msc).
              2. Navigate to Windows Components > Remote Desktop Services >
                 Remote Desktop Session Host > Security.
              3. Verify NLA is 'Enabled'.
            expected_output: |
              1
            remediation: |
              Windows Components > Remote Desktop Services >
              Remote Desktop Session Host > Security > Require NLA = Enabled

  # ---------------------------------------------------------------------------
  # 17  Services Hardening
  # ---------------------------------------------------------------------------
  - number: "17"
    title: "Services Hardening"
    children:
      - number: "17.1"
        title: "Unnecessary Services"
        checks:
          - number: "17.1.1"
            title: "Ensure 'Remote Registry (RemoteRegistry)' is set to 'Disabled'"
            description: >
              Enables remote registry modification.
            rationale: >
              Remote registry could allow attackers to modify settings.
            level: 1
            scored: true
            audit_command: |
              Get-Service -Name "RemoteRegistry" -ErrorAction SilentlyContinue | Select-Object -ExpandProperty StartType
            audit_steps: |
              1. Open services.msc.
              2. Locate 'Remote Registry'.
              3. Verify StartType is 'Disabled'.
            expected_output: |
              Disabled
            remediation: |
              Set-Service -Name "RemoteRegistry" -StartupType Disabled

          - number: "17.1.2"
            title: "Ensure 'Xbox services' are set to 'Disabled'"
            description: >
              Xbox services provide gaming functionality.
            rationale: >
              Unnecessary in enterprise environments.
            level: 2
            scored: true
            audit_command: |
              Get-Service -Name "XblAuthManager","XblGameSave","XboxGipSvc","XboxNetApiSvc" -ErrorAction SilentlyContinue | Select-Object Name, StartType
            audit_steps: |
              1. Open services.msc.
              2. Locate Xbox-related services.
              3. Verify all are 'Disabled'.
            expected_output: |
              All Xbox services: StartType = Disabled
            remediation: |
              "XblAuthManager","XblGameSave","XboxGipSvc","XboxNetApiSvc" | ForEach-Object { Set-Service -Name $_ -StartupType Disabled }

  # ---------------------------------------------------------------------------
  # 18  Administrative Templates
  # ---------------------------------------------------------------------------
  - number: "18"
    title: "Administrative Templates"
    children:
      - number: "18.1"
        title: "AutoPlay and AutoRun"
        checks:
          - number: "18.1.1"
            title: "Ensure 'Turn off Autoplay' is set to 'Enabled: All drives'"
            description: >
              AutoPlay reads from drives as soon as media is inserted.
            rationale: >
              Prevents automatic execution of malicious code from
              removable media.
            level: 1
            scored: true
            audit_command: |
              Get-ItemProperty -Path "HKLM:\SOFTWARE\Microsoft\Windows\CurrentVersion\Policies\Explorer" -Name "NoDriveTypeAutoRun" -ErrorAction SilentlyContinue | Select-Object -ExpandProperty NoDriveTypeAutoRun
            audit_steps: |
              1. Open the Group Policy Management Console (gpmc.msc).
              2. Navigate to Windows Components > AutoPlay Policies.
              3. Verify 'Turn off Autoplay' is 'Enabled: All drives'.
            expected_output: |
              255
            remediation: |
              Windows Components > AutoPlay Policies > Turn off Autoplay = All drives

          - number: "18.1.2"
            title: "Ensure 'Set the default behavior for AutoRun' is set to 'Enabled: Do not execute any autorun commands'"
            description: >
              Sets default behavior for autorun.inf files.
            rationale: >
              Autorun commands can spread malware via removable media.
            level: 1
            scored: true
            audit_command: |
              Get-ItemProperty -Path "HKLM:\SOFTWARE\Microsoft\Windows\CurrentVersion\Policies\Explorer" -Name "NoAutorun" -ErrorAction SilentlyContinue | Select-Object -ExpandProperty NoAutorun
            audit_steps: |
              1. Open the Group Policy Management Console (gpmc.msc).
              2. Navigate to Windows Components > AutoPlay Policies.
              3. Verify AutoRun default is 'Do not execute any autorun commands'.
            expected_output: |
              1
            remediation: |
              Windows Components > AutoPlay Policies >
              Set the default behavior for AutoRun

      - number: "18.2"
        title: "BitLocker Drive Encryption"
        checks:
          - number: "18.2.1"
            title: "Ensure 'Require additional authentication at startup' is set to 'Enabled'"
            description: >
              Configures BitLocker to require additional authentication at startup.
            rationale: >
              Without additional authentication, BitLocker only protects
              against offline attacks.
            level: 1
            scored: true
            audit_command: |
              Get-ItemProperty -Path "HKLM:\SOFTWARE\Policies\Microsoft\FVE" -Name "UseAdvancedStartup" -ErrorAction SilentlyContinue | Select-Object -ExpandProperty UseAdvancedStartup
            audit_steps: |
              1. Open the Group Policy Management Console (gpmc.msc).
              2. Navigate to Windows Components > BitLocker Drive Encryption >
                 Operating System Drives.
              3. Verify 'Require additional authentication at startup' is 'Enabled'.
            expected_output: |
              1
            remediation: |
              Windows Components > BitLocker Drive Encryption >
              Operating System Drives > Require additional authentication at startup

      - number: "18.3"
        title: "WinRM Configuration"
        checks:
          - number: "18.3.1"
            title: "Ensure 'Allow Basic authentication' for WinRM Client is set to 'Disabled'"
            description: >
              Controls whether WinRM client uses Basic authentication.
            rationale: >
              Basic authentication sends credentials in clear text.
            level: 1
            scored: true
            audit_command: |
              Get-ItemProperty -Path "HKLM:\SOFTWARE\Policies\Microsoft\Windows\WinRM\Client" -Name "AllowBasic" -ErrorAction SilentlyContinue | Select-Object -ExpandProperty AllowBasic
            audit_steps: |
              1. Open the Group Policy Management Console (gpmc.msc).
              2. Navigate to Windows Components > WinRM > WinRM Client.
              3. Verify 'Allow Basic authentication' is 'Disabled'.
            expected_output: |
              0
            remediation: |
              Windows Components > WinRM > WinRM Client >
              Allow Basic authentication = Disabled

          - number: "18.3.2"
            title: "Ensure 'Allow unencrypted traffic' for WinRM Client is set to 'Disabled'"
            description: >
              Controls whether WinRM sends unencrypted messages.
            rationale: >
              Encrypting WinRM traffic prevents eavesdropping.
            level: 1
            scored: true
            audit_command: |
              Get-ItemProperty -Path "HKLM:\SOFTWARE\Policies\Microsoft\Windows\WinRM\Client" -Name "AllowUnencryptedTraffic" -ErrorAction SilentlyContinue | Select-Object -ExpandProperty AllowUnencryptedTraffic
            audit_steps: |
              1. Open the Group Policy Management Console (gpmc.msc).
              2. Navigate to Windows Components > WinRM > WinRM Client.
              3. Verify 'Allow unencrypted traffic' is 'Disabled'.
            expected_output: |
              0
            remediation: |
              Windows Components > WinRM > WinRM Client >
              Allow unencrypted traffic = Disabled

  # ---------------------------------------------------------------------------
  # 19  Privacy and Telemetry
  # ---------------------------------------------------------------------------
  - number: "19"
    title: "Privacy and Telemetry"
    children:
      - number: "19.1"
        title: "Telemetry Settings"
        checks:
          - number: "19.1.1"
            title: "Ensure 'Allow Telemetry' is set to '0 - Security'"
            description: >
              Determines diagnostic and usage data sent to Microsoft.
              Enterprise edition supports '0 - Security' level.
            rationale: >
              Minimizes sensitive data sent externally.
            level: 1
            scored: true
            audit_command: |
              Get-ItemProperty -Path "HKLM:\SOFTWARE\Policies\Microsoft\Windows\DataCollection" -Name "AllowTelemetry" -ErrorAction SilentlyContinue | Select-Object -ExpandProperty AllowTelemetry
            audit_steps: |
              1. Open the Group Policy Management Console (gpmc.msc).
              2. Navigate to Windows Components > Data Collection and Preview Builds.
              3. Verify 'Allow Diagnostic Data' is '0 - Security'.
            expected_output: |
              0
            remediation: |
              Windows Components > Data Collection and Preview Builds >
              Allow Diagnostic Data = 0 - Security [Enterprise Only]

          - number: "19.1.2"
            title: "Ensure 'Do not show feedback notifications' is set to 'Enabled'"
            description: >
              Prevents feedback notifications from Microsoft.
            rationale: >
              Feedback notifications transmit usage information.
            level: 1
            scored: true
            audit_command: |
              Get-ItemProperty -Path "HKLM:\SOFTWARE\Policies\Microsoft\Windows\DataCollection" -Name "DoNotShowFeedbackNotifications" -ErrorAction SilentlyContinue | Select-Object -ExpandProperty DoNotShowFeedbackNotifications
            audit_steps: |
              1. Open the Group Policy Management Console (gpmc.msc).
              2. Navigate to Windows Components > Data Collection and Preview Builds.
              3. Verify 'Do not show feedback notifications' is 'Enabled'.
            expected_output: |
              1
            remediation: |
              Windows Components > Data Collection and Preview Builds >
              Do not show feedback notifications = Enabled

          - number: "19.1.3"
            title: "Ensure 'Disable pre-release features or settings' is set to 'Enabled: Disabled'"
            description: >
              Controls pre-release features on enterprise devices.
            rationale: >
              Pre-release features may introduce instability and
              security risks in production.
            level: 1
            scored: true
            audit_command: |
              Get-ItemProperty -Path "HKLM:\SOFTWARE\Policies\Microsoft\Windows\PreviewBuilds" -Name "EnableConfigFlighting" -ErrorAction SilentlyContinue | Select-Object -ExpandProperty EnableConfigFlighting
            audit_steps: |
              1. Open the Group Policy Management Console (gpmc.msc).
              2. Navigate to Windows Components > Data Collection and Preview Builds.
              3. Verify 'Toggle user control over Insider builds' is 'Disabled'.
            expected_output: |
              0
            remediation: |
              Windows Components > Data Collection and Preview Builds >
              Toggle user control over Insider builds = Disabled
